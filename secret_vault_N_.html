<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Secret Vault</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1220;--card:#161d2e;--card-saved:#131a2a;--border:#263045;
  --accent:#00d4ff;--accent2:#818cf8;--text:#f0f2f5;--text2:#9ba4b8;
  --danger:#f87171;--success:#4ade80;--mask:#6b7590;--yellow:#fcd34d;
  --folder:#1c2540;--folder-border:#2d3d5a;
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:99999;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--danger)}

/* LOCK SCREEN */
#lockScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.lock-icon{font-size:48px;margin-bottom:8px;animation:lockPulse 2s ease-in-out infinite}
@keyframes lockPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.lock-title{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.lock-subtitle{font-size:13px;color:var(--text2);margin-bottom:20px;text-align:center;min-height:18px}
.lock-step-label{font-size:12px;color:var(--accent);margin-bottom:12px;font-weight:600;min-height:16px}

/* Lock mode selector */
.lock-mode-sel{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:3px;margin-bottom:20px;width:280px}
.lock-mode-btn{flex:1;padding:7px 0;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
.lock-mode-btn.active{background:rgba(0,212,255,.15);color:var(--accent)}

/* PIN */
.pin-wrap{display:flex;flex-direction:column;align-items:center}
.pin-dots{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(0,212,255,.4)}
.pin-dot.error{border-color:var(--danger);background:var(--danger);animation:dotShake .4s ease}
@keyframes dotShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;width:100%}
.num-btn{width:100%;aspect-ratio:1.4;border:1px solid var(--border);border-radius:14px;background:var(--card);color:var(--text);font-size:24px;font-family:'JetBrains Mono',monospace;font-weight:600;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}
.num-btn:active{background:rgba(0,212,255,.15);border-color:var(--accent);transform:scale(.95)}
.num-btn.fn{font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);border-color:transparent;background:transparent}

/* PATTERN */
.pat-wrap{display:flex;flex-direction:column;align-items:center}
.pat-area{position:relative;touch-action:none;-webkit-user-select:none;user-select:none}
.pat-area canvas{position:absolute;left:0;top:0;pointer-events:none}
.pat-dot-vis{position:absolute;width:22px;height:22px;border-radius:50%;border:2.5px solid #3a4a65;background:transparent;transition:background .12s,border-color .12s,box-shadow .12s;pointer-events:none;transform:translate(-50%,-50%)}
.pat-dot-vis.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 14px rgba(0,212,255,.5)}
.pat-dot-vis.error{background:var(--danger);border-color:var(--danger);box-shadow:0 0 14px rgba(248,113,113,.5)}
.pat-info{font-size:11px;color:var(--text2);margin-top:14px;min-height:16px;text-align:center}

/* MAIN APP */
#mainApp{display:none}
.container{max-width:600px;margin:0 auto;padding:16px 12px 80px}
.header{text-align:center;padding:14px 0 10px}
.header h1{font-size:21px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:11px;color:var(--text2);margin-top:3px}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 4px 10px}
.count-info{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;display:flex;gap:10px}
.top-actions{display:flex;gap:6px}
.top-btn{background:rgba(129,140,248,.15);border:none;border-radius:8px;padding:6px 10px;color:var(--accent2);font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .12s}
.top-btn:active{transform:scale(.95)}

/* SEARCH */
.search-wrap{padding:0 0 10px;display:none}
.search-wrap.show{display:block}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:#4a5570}

/* SETTINGS */
#settingsPanel{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;animation:slideIn .3s ease}
#settingsPanel.show{display:block}
.set-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.set-row{margin-bottom:10px}
.set-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.set-input-wrap{display:flex;gap:8px}
.set-input{flex:1;background:#121a2c;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:16px;font-family:'JetBrains Mono',monospace;color:var(--text);outline:none;text-align:center;letter-spacing:6px;-webkit-text-security:disc}
.set-input:focus{border-color:var(--accent)}
.set-input::placeholder{letter-spacing:0;color:#4a5570;-webkit-text-security:none}
.set-save-btn{padding:10px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap}
.set-save-btn:active{transform:scale(.95)}
.set-error{font-size:11px;color:var(--danger);margin-top:4px;min-height:16px}
.set-lock-type{display:flex;gap:6px;margin-bottom:10px}
.set-lock-opt{flex:1;padding:9px 0;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.set-lock-opt.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08)}
.set-close-btn{margin-top:10px;width:100%;padding:10px;background:#1e2a3a;border:none;border-radius:10px;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer}
.set-select{background:#121a2c;border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;width:100%;-webkit-appearance:none}
.set-divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.set-export-row{display:flex;gap:8px;margin-top:8px}
.set-export-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;text-align:center}
.set-export-btn:active{border-color:var(--accent);color:var(--accent)}
.hidden-file-input{display:none}

/* FOLDER */
.folder{background:var(--folder);border:1px solid var(--folder-border);border-radius:14px;margin-bottom:12px;overflow:hidden;animation:slideIn .25s ease both}
.folder-header{display:flex;align-items:center;padding:10px 12px;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.folder-toggle{font-size:14px;transition:transform .2s;flex-shrink:0;width:20px;text-align:center}
.folder-toggle.open{transform:rotate(90deg)}
.folder-name{flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:700;padding:2px 4px;outline:none;min-width:0}
.folder-name:focus{border-bottom-color:var(--accent)}
.folder-name::placeholder{color:#4a5570;font-weight:400}
.folder-actions{display:flex;gap:4px;flex-shrink:0}
.folder-btn{padding:4px 8px;border:none;border-radius:6px;font-size:11px;cursor:pointer;transition:all .12s;background:rgba(0,212,255,.1);color:var(--accent);font-family:'Noto Sans KR',sans-serif;font-weight:600}
.folder-btn:active{transform:scale(.92)}
.folder-btn.danger{background:rgba(248,113,113,.1);color:var(--danger)}
.folder-body{padding:0 10px 10px;display:none}
.folder-body.open{display:block}
.folder-count{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;flex-shrink:0}

/* SLOT */
.slot{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s,background .2s}
.slot.saved{background:var(--card-saved);border-color:#1e2e48}
.slot:focus-within{border-color:var(--accent)}
.slot-top{display:flex;align-items:center;padding:8px 10px 0;gap:6px}
.slot-title-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;padding:3px 2px;outline:none;min-width:0}
.slot-title-input:focus{border-bottom-color:var(--accent)}
.slot-title-input::placeholder{color:#4a5570;font-weight:400}
.slot-title-input.readonly{border-bottom-color:transparent;pointer-events:none}
.slot-btns{display:flex;gap:3px;flex-shrink:0}
.s-btn{padding:4px 8px;border:none;border-radius:6px;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.s-btn:active{transform:scale(.92)}
.s-btn-view{background:rgba(129,140,248,.15);color:var(--accent2)}
.s-btn-view.active{background:rgba(129,140,248,.3)}
.s-btn-save{background:rgba(0,212,255,.12);color:var(--accent)}
.s-btn-save.is-edit{background:rgba(252,211,77,.12);color:var(--yellow)}
.s-btn-copy{background:rgba(74,222,128,.1);color:var(--success)}
.s-btn-del{background:rgba(248,113,113,.1);color:var(--danger);padding:4px 6px}
.slot-badge{display:none;font-size:9px;color:var(--success);font-weight:600;padding:2px 6px;background:rgba(74,222,128,.1);border-radius:20px;flex-shrink:0}
.slot-badge.show{display:block}
.slot-body{padding:6px 10px 10px}
.slot-secret{width:100%;background:#121a2c;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--text);outline:none;resize:none;min-height:38px;transition:border-color .2s}
.slot-secret:focus{border-color:var(--accent)}
.slot-secret::placeholder{color:#3d4a60;font-family:'Noto Sans KR',sans-serif}
.slot-mask{width:100%;background:#121a2c;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--mask);letter-spacing:3px;min-height:38px;white-space:nowrap;overflow:hidden;user-select:none;display:none}
.slot-mask.revealed{color:var(--accent);letter-spacing:0;white-space:normal;word-break:break-all}
.slot.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.2)}

/* BOTTOM ACTION BAR (double-tap selection) */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 14px;display:none;gap:6px;z-index:996;max-width:600px;margin:0 auto;animation:slideUp .2s ease}
.action-bar.show{display:flex}
.ab-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;text-align:center;transition:all .12s}
.ab-btn:active{transform:scale(.95)}
.ab-btn-copy{background:rgba(74,222,128,.12);color:var(--success)}
.ab-btn-cut{background:rgba(252,211,77,.12);color:var(--yellow)}
.ab-btn-paste{background:rgba(0,212,255,.12);color:var(--accent)}
.ab-btn-up{background:rgba(129,140,248,.12);color:var(--accent2)}
.ab-btn-down{background:rgba(129,140,248,.12);color:var(--accent2)}
.ab-btn-cancel{background:rgba(248,113,113,.1);color:var(--danger)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* FULLSCREEN */
.fs-overlay{position:fixed;inset:0;background:var(--bg);z-index:997;display:none;flex-direction:column}
.fs-overlay.show{display:flex}
.fs-header{display:flex;align-items:center;padding:12px 14px;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.fs-title{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:16px;font-family:'Noto Sans KR',sans-serif;font-weight:700;padding:4px 2px;outline:none;min-width:0}
.fs-title:focus{border-bottom-color:var(--accent)}
.fs-title::placeholder{color:#4a5570;font-weight:400}
.fs-title.readonly{border-bottom-color:transparent;color:var(--text)}
.fs-close{width:40px;height:40px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fs-close:active{transform:scale(.92);border-color:var(--accent)}
.fs-body{flex:1;padding:12px 14px;overflow-y:auto;display:flex;flex-direction:column}
.fs-textarea{flex:1;width:100%;background:#121a2c;border:1px solid var(--border);border-radius:12px;padding:14px;font-size:15px;font-family:'JetBrains Mono',monospace;color:var(--text);outline:none;resize:none;line-height:1.6}
.fs-textarea:focus{border-color:var(--accent)}
.fs-textarea::placeholder{color:#3d4a60;font-family:'Noto Sans KR',sans-serif}
.fs-mask-view{flex:1;width:100%;background:#121a2c;border:1px solid var(--border);border-radius:12px;padding:14px;font-size:15px;font-family:'JetBrains Mono',monospace;color:var(--mask);letter-spacing:3px;line-height:1.6;word-break:break-all;overflow-y:auto;user-select:none}
.fs-mask-view.revealed{color:var(--accent);letter-spacing:0;user-select:text}
.fs-actions{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.fs-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;transition:all .12s;text-align:center}
.fs-btn:active{transform:scale(.96)}
.fs-btn-save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.fs-btn-view{background:rgba(129,140,248,.15);color:var(--accent2)}
.fs-btn-copy{background:rgba(74,222,128,.12);color:var(--success)}
.fs-btn-edit{background:rgba(252,211,77,.12);color:var(--yellow)}

/* Add buttons */
.add-bar{display:flex;gap:8px;padding:6px 0 16px}
.add-btn{flex:1;background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:12px;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.add-btn:active{border-color:var(--accent);color:var(--accent)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;width:90%;max-width:320px;text-align:center}
.modal h3{font-size:16px;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer}
.modal-cancel{background:#1e2a3a;color:var(--text2)}
.modal-confirm{background:var(--danger);color:#fff}

.highlight{background:rgba(0,212,255,.18);border-radius:4px;padding:0 2px}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-icon">🔐</div>
  <div class="lock-title">Secret Vault</div>
  <div class="lock-subtitle" id="lockSubtitle">비밀번호를 입력하세요</div>
  <div class="lock-step-label" id="lockStepLabel">&nbsp;</div>

  <div class="lock-mode-sel" id="lockModeSel" style="display:none">
    <button class="lock-mode-btn active" data-m="pin" onclick="selectLockMode('pin')">🔢 PIN</button>
    <button class="lock-mode-btn" data-m="pattern" onclick="selectLockMode('pattern')">⬡ 패턴</button>
    <button class="lock-mode-btn" data-m="both" onclick="selectLockMode('both')">🔢+⬡ 이중</button>
  </div>

  <div class="pin-wrap" id="lockPinWrap" style="display:none">
    <div class="pin-dots" id="lockPinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="numpad" id="lockNumpad">
      <button class="num-btn" data-n="1">1</button><button class="num-btn" data-n="2">2</button><button class="num-btn" data-n="3">3</button>
      <button class="num-btn" data-n="4">4</button><button class="num-btn" data-n="5">5</button><button class="num-btn" data-n="6">6</button>
      <button class="num-btn" data-n="7">7</button><button class="num-btn" data-n="8">8</button><button class="num-btn" data-n="9">9</button>
      <button class="num-btn fn" data-a="back">다시</button><button class="num-btn" data-n="0">0</button><button class="num-btn fn" data-a="del">⌫</button>
    </div>
  </div>

  <div class="pat-wrap" id="lockPatWrap" style="display:none">
    <div class="pat-area" id="lockPatArea" style="width:240px;height:240px"></div>
    <div class="pat-info" id="lockPatInfo">최소 4개 점을 연결하세요</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="container">
    <div class="header">
      <h1>🔐 Secret Vault</h1>
      <p>폴더별 관리 · 이중 잠금 · 간편 복사</p>
    </div>
    <div class="top-bar">
      <div class="count-info">
        <span id="countText">0개</span>
        <span id="savedCount">저장 0</span>
      </div>
      <div class="top-actions">
        <button class="top-btn" onclick="toggleSearch()">🔍</button>
        <button class="top-btn" onclick="toggleSettings()">⚙️</button>
      </div>
    </div>

    <div class="search-wrap" id="searchWrap">
      <input type="text" class="search-input" id="searchInput" placeholder="제목으로 검색..." oninput="doSearch()">
    </div>

    <div id="settingsPanel">
      <div id="setStep1">
        <div class="set-title">🔒 현재 비밀번호 확인</div>
        <div class="set-row"><label>현재 비밀번호를 입력하세요</label></div>
        <div id="setVerifyPinArea" style="display:none">
          <div class="set-input-wrap">
            <input type="password" class="set-input" id="setVerifyPin" placeholder="PIN 6자리" maxlength="6" inputmode="numeric">
            <button class="set-save-btn" onclick="verifySettingsPw()">확인</button>
          </div>
        </div>
        <div id="setVerifyPatArea" style="display:none">
          <div style="display:flex;flex-direction:column;align-items:center;margin-top:8px">
            <div class="pat-area" id="setVerifyPatArea2" style="width:200px;height:200px"></div>
          </div>
        </div>
        <div class="set-error" id="setVerifyErr">&nbsp;</div>
        <div id="setVerifyBothInfo" style="display:none;font-size:11px;color:var(--accent);margin-top:4px;text-align:center"></div>
        <button class="set-close-btn" onclick="toggleSettings()">취소</button>
      </div>

      <div id="setStep2" style="display:none">
        <div class="set-title">⚙️ 설정</div>
        <div class="set-row">
          <label>자동 잠금 시간</label>
          <select class="set-select" id="setAutoLock" onchange="saveAutoLock()">
            <option value="0">끄기</option>
            <option value="60">1분</option>

<script>
const K={PIN:'SV_PIN',PAT:'SV_PAT',MODE:'SV_MODE',DATA:'SV_DATA',AUTOLOCK:'SV_AUTOLOCK',LOCKOUT:'SV_LOCKOUT',AUTOMASK:'SV_AUTOMASK'};
const MAX_FAIL=5,LOCKOUT_MS=60000;

async function sha256(s){const d=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function showToast(m,err){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(err?' error':'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',2000)}
function escH(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function escA(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getLockMode(){return localStorage.getItem(K.MODE)||''}
function getAutoLockSec(){return parseInt(localStorage.getItem(K.AUTOLOCK)||'300')}
function isLockedOut(){const t=parseInt(localStorage.getItem(K.LOCKOUT)||'0');if(t>Date.now())return true;if(t)localStorage.removeItem(K.LOCKOUT);return false}
function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch{}}
function getAutoMaskSec(){return parseInt(localStorage.getItem(K.AUTOMASK)||'10')}

/* ===== AUTO MASK ===== */
let autoMaskTimer=null;
function startAutoMaskTimer(){
  clearTimeout(autoMaskTimer);
  const sec=getAutoMaskSec();
  if(!sec)return;
  autoMaskTimer=setTimeout(()=>{
    // Hide all inline revealed
    document.querySelectorAll('.slot-mask.revealed').forEach(m=>{
      const id=m.id.replace('mask_','');
      const item=findItem(id);
      if(item)m.textContent='●'.repeat(Math.min(item.secret.length,30));
      m.classList.remove('revealed');
      const b=document.getElementById('viewBtn_'+id);
      if(b){b.textContent='👁️';b.classList.remove('active')}
    });
    // Hide fullscreen revealed
    if(fsRevealed){
      const mv=document.getElementById('fsMaskView');
      if(mv&&fsCurrentId){
        const item=findItem(fsCurrentId);
        if(item)mv.textContent='●'.repeat(Math.min(item.secret.length,80));
        mv.classList.remove('revealed');
        const btn=document.querySelector('.fs-btn-view');
        if(btn)btn.textContent='👁️ 보기';
      }
      fsRevealed=false;
    }
    anyRevealed=false;
    showToast('🔒 자동 마스크',true);
  },sec*1000);
}
function clearAutoMaskTimer(){clearTimeout(autoMaskTimer)}
function saveAutoMask(){const v=document.getElementById('setAutoMask').value;localStorage.setItem(K.AUTOMASK,v);showToast(v==='0'?'🙈 자동 마스크 끄기':`🙈 자동 마스크 ${v}초`)}

/* ===== PATTERN ENGINE (touch on container, not canvas) ===== */
const patInstances={};
const patAbortControllers={};
function initPat(areaId,size,onDone){
  const area=document.getElementById(areaId);
  if(!area)return null;
  // Abort previous listeners
  if(patAbortControllers[areaId])patAbortControllers[areaId].abort();
  const ac=new AbortController();patAbortControllers[areaId]=ac;
  area.innerHTML='';
  const canvas=document.createElement('canvas');
  canvas.width=size;canvas.height=size;
  canvas.style.cssText=`width:${size}px;height:${size}px`;
  area.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const gap=size/3,dots=[];
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const cx=gap*c+gap/2,cy=gap*r+gap/2,idx=r*3+c;
    const vis=document.createElement('div');
    vis.className='pat-dot-vis';
    vis.style.left=cx+'px';vis.style.top=cy+'px';
    area.appendChild(vis);
    dots.push({cx,cy,vis,idx});
  }
  let sel=[],drawing=false,curPos=null,locked=false;
  function closest(x,y){for(const d of dots){if(Math.hypot(d.cx-x,d.cy-y)<gap*.42&&!sel.includes(d.idx))return d}return null}
  function draw(extra){
    ctx.clearRect(0,0,size,size);if(!sel.length)return;
    ctx.strokeStyle=locked?'#f87171':'#00d4ff';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(dots[sel[0]].cx,dots[sel[0]].cy);
    for(let i=1;i<sel.length;i++)ctx.lineTo(dots[sel[i]].cx,dots[sel[i]].cy);
    if(extra&&!locked)ctx.lineTo(extra.x,extra.y);ctx.stroke();
  }
  function addMid(from,to){const mr=(Math.floor(from/3)+Math.floor(to/3))/2,mc=(from%3+to%3)/2;if(mr===Math.floor(mr)&&mc===Math.floor(mc)){const mid=mr*3+mc;if(!sel.includes(mid)){sel.push(mid);dots[mid].vis.classList.add('active')}}}
  function xy(e){const r=area.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
  function onS(e){if(locked)return;e.preventDefault();reset();drawing=true;const p=xy(e),d=closest(p.x,p.y);if(d){sel.push(d.idx);d.vis.classList.add('active');vib(15)}}
  function onM(e){if(!drawing||locked)return;e.preventDefault();const p=xy(e);curPos=p;const d=closest(p.x,p.y);if(d){if(sel.length)addMid(sel[sel.length-1],d.idx);sel.push(d.idx);d.vis.classList.add('active');vib(10)}draw(curPos)}
  function onE(e){if(!drawing||locked)return;e.preventDefault();drawing=false;curPos=null;draw();if(sel.length){vib(30);onDone(sel.join(''),inst)}}
  function reset(){sel=[];locked=false;dots.forEach(d=>d.vis.classList.remove('active','error'));ctx.clearRect(0,0,size,size)}
  function showErr(){locked=true;sel.forEach(i=>dots[i].vis.classList.add('error'));draw();setTimeout(reset,600)}
  const sig={signal:ac.signal};
  area.addEventListener('mousedown',onS,sig);area.addEventListener('mousemove',onM,sig);area.addEventListener('mouseup',onE,sig);area.addEventListener('mouseleave',onE,sig);
  area.addEventListener('touchstart',onS,{passive:false,...sig});area.addEventListener('touchmove',onM,{passive:false,...sig});area.addEventListener('touchend',onE,{passive:false,...sig});
  const inst={reset,showErr};
  patInstances[areaId]=inst;return inst;
}

/* ===== LOCK SCREEN ===== */
let lockPhase='',pinBuf='',pinFirst='',patFirst='',failCount=0,chosenMode='pin';

function initLock(){
  pinBuf='';pinFirst='';patFirst='';failCount=0;
  const mode=getLockMode();
  if(!mode){
    document.getElementById('lockSubtitle').textContent='잠금 방식을 선택하고 비밀번호를 생성하세요';
    document.getElementById('lockModeSel').style.display='flex';
    chosenMode='pin';updateModeSelUI();startCreateFlow();
  }else{
    document.getElementById('lockSubtitle').textContent='비밀번호를 입력하세요';
    document.getElementById('lockModeSel').style.display='none';
    startLoginFlow(mode);
  }
  if(isLockedOut()){const r=Math.ceil((parseInt(localStorage.getItem(K.LOCKOUT))-Date.now())/1000);showToast(`⏳ ${r}초 후 다시 시도하세요`,true)}
}

function selectLockMode(m){chosenMode=m;updateModeSelUI();startCreateFlow()}
function updateModeSelUI(){document.querySelectorAll('.lock-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===chosenMode))}
function showLockPin(){document.getElementById('lockPinWrap').style.display='flex';document.getElementById('lockPatWrap').style.display='none'}
function showLockPat(){document.getElementById('lockPinWrap').style.display='none';document.getElementById('lockPatWrap').style.display='flex';initPat('lockPatArea',240,handleLockPat)}

function startCreateFlow(){
  pinFirst='';patFirst='';pinBuf='';
  if(chosenMode==='pin'){lockPhase='create-pin';document.getElementById('lockStepLabel').textContent='PIN 6자리를 입력하세요';showLockPin();updatePinDots()}
  else if(chosenMode==='pattern'){lockPhase='create-pat';document.getElementById('lockStepLabel').textContent='패턴을 그려주세요';showLockPat();document.getElementById('lockPatInfo').textContent='최소 4개 점을 연결하세요'}
  else{lockPhase='create-both-pin';document.getElementById('lockStepLabel').textContent='[1/2] PIN 6자리를 입력하세요';showLockPin();updatePinDots()}
}
function startLoginFlow(mode){
  pinBuf='';
  if(mode==='pin'){lockPhase='login-pin';document.getElementById('lockStepLabel').textContent='PIN 6자리를 입력하세요';showLockPin();updatePinDots()}
  else if(mode==='pattern'){lockPhase='login-pat';document.getElementById('lockStepLabel').textContent='패턴을 그려주세요';showLockPat();document.getElementById('lockPatInfo').textContent=''}
  else{lockPhase='login-both-pin';document.getElementById('lockStepLabel').textContent='[1/2] PIN을 입력하세요';showLockPin();updatePinDots()}
}

function updatePinDots(){document.querySelectorAll('#lockPinDots .pin-dot').forEach((d,i)=>{d.classList.toggle('filled',i<pinBuf.length);d.classList.remove('error')})}
function pinDotsError(){document.querySelectorAll('#lockPinDots .pin-dot').forEach(d=>{d.classList.add('error');d.classList.remove('filled')});setTimeout(()=>{pinBuf='';updatePinDots()},500)}

document.getElementById('lockNumpad').addEventListener('click',e=>{
  const btn=e.target.closest('.num-btn');if(!btn)return;
  if(isLockedOut()){const r=Math.ceil((parseInt(localStorage.getItem(K.LOCKOUT))-Date.now())/1000);showToast(`⏳ ${r}초 후 다시 시도`,true);return}
  const n=btn.dataset.n,a=btn.dataset.a;
  if(a==='del'){if(pinBuf.length){pinBuf=pinBuf.slice(0,-1);updatePinDots()}return}
  if(a==='back'){pinBuf='';updatePinDots();if(lockPhase.startsWith('confirm'))startCreateFlow();return}
  if(n===undefined||pinBuf.length>=6)return;
  pinBuf+=n;updatePinDots();vib(15);
  if(pinBuf.length===6)setTimeout(handlePinDone,150);
});

async function handlePinDone(){
  const ph=lockPhase;
  if(ph==='create-pin'){pinFirst=pinBuf;pinBuf='';lockPhase='confirm-pin';updatePinDots();document.getElementById('lockStepLabel').textContent='PIN을 한번 더 입력하세요';return}
  if(ph==='confirm-pin'){if(pinBuf===pinFirst){const h=await sha256(pinBuf);localStorage.setItem(K.PIN,h);localStorage.setItem(K.MODE,'pin');unlockApp()}else{showToast('❌ PIN이 일치하지 않습니다',true);pinDotsError();startCreateFlow()}return}
  if(ph==='create-both-pin'){pinFirst=pinBuf;pinBuf='';lockPhase='confirm-both-pin';updatePinDots();document.getElementById('lockStepLabel').textContent='[1/2] PIN을 한번 더 입력하세요';return}
  if(ph==='confirm-both-pin'){if(pinBuf!==pinFirst){showToast('❌ PIN이 일치하지 않습니다',true);pinDotsError();startCreateFlow();return}const h=await sha256(pinBuf);localStorage.setItem(K.PIN,h);lockPhase='create-both-pat';document.getElementById('lockStepLabel').textContent='[2/2] 패턴을 그려주세요';showLockPat();document.getElementById('lockPatInfo').textContent='최소 4개 점을 연결하세요';return}
  if(ph==='login-pin'){const h=await sha256(pinBuf);if(h===localStorage.getItem(K.PIN)){failCount=0;unlockApp()}else{handleFail('PIN');pinDotsError()}return}
  if(ph==='login-both-pin'){const h=await sha256(pinBuf);if(h===localStorage.getItem(K.PIN)){pinBuf='';lockPhase='login-both-pat';document.getElementById('lockStepLabel').textContent='[2/2] 패턴을 그려주세요';showLockPat();document.getElementById('lockPatInfo').textContent=''}else{handleFail('PIN');pinDotsError()}return}
}

async function handleLockPat(code,inst){
  const ph=lockPhase;
  if(isLockedOut()){const r=Math.ceil((parseInt(localStorage.getItem(K.LOCKOUT))-Date.now())/1000);showToast(`⏳ ${r}초 후 다시 시도`,true);inst.showErr();return}
  if(code.length<4){showToast('⚠️ 최소 4개 점을 연결하세요',true);inst.showErr();return}
  if(ph==='create-pat'){patFirst=code;lockPhase='confirm-pat';document.getElementById('lockStepLabel').textContent='패턴을 한번 더 그려주세요';document.getElementById('lockPatInfo').textContent='확인을 위해 동일하게';setTimeout(()=>inst.reset(),400);return}
  if(ph==='confirm-pat'){if(code===patFirst){const h=await sha256(code);localStorage.setItem(K.PAT,h);localStorage.setItem(K.MODE,'pattern');unlockApp()}else{showToast('❌ 패턴이 일치하지 않습니다',true);inst.showErr();setTimeout(()=>startCreateFlow(),650)}return}
  if(ph==='create-both-pat'){patFirst=code;lockPhase='confirm-both-pat';document.getElementById('lockStepLabel').textContent='[2/2] 패턴을 한번 더 그려주세요';document.getElementById('lockPatInfo').textContent='확인을 위해 동일하게';setTimeout(()=>inst.reset(),400);return}
  if(ph==='confirm-both-pat'){if(code===patFirst){const h=await sha256(code);localStorage.setItem(K.PAT,h);localStorage.setItem(K.MODE,'both');unlockApp()}else{showToast('❌ 패턴이 일치하지 않습니다',true);inst.showErr();setTimeout(()=>{lockPhase='create-both-pat';patFirst='';document.getElementById('lockStepLabel').textContent='[2/2] 패턴을 다시 그려주세요';document.getElementById('lockPatInfo').textContent='최소 4개 점을 연결하세요'},650)}return}
  if(ph==='login-pat'){const h=await sha256(code);if(h===localStorage.getItem(K.PAT)){failCount=0;unlockApp()}else{handleFail('패턴');inst.showErr()}return}
  if(ph==='login-both-pat'){const h=await sha256(code);if(h===localStorage.getItem(K.PAT)){failCount=0;unlockApp()}else{handleFail('패턴');inst.showErr();lockPhase='login-both-pin';document.getElementById('lockStepLabel').textContent='[1/2] PIN을 입력하세요';showLockPin();pinBuf='';updatePinDots()}return}
}

function handleFail(type){failCount++;if(failCount>=MAX_FAIL){localStorage.setItem(K.LOCKOUT,(Date.now()+LOCKOUT_MS).toString());showToast(`🔒 ${MAX_FAIL}회 실패 — 1분간 잠김`,true);vib([100,50,100]);failCount=0}else{showToast(`❌ ${type} 틀림 (${failCount}/${MAX_FAIL})`,true);vib([80,40,80])}}

function unlockApp(){document.getElementById('lockScreen').style.display='none';document.getElementById('mainApp').style.display='block';initApp();startAutoLockTimer()}

function relock(){
  clearTimeout(autoLockTimer);clearAutoMaskTimer();
  const fsOv=document.getElementById('fsOverlay');
  if(fsOv&&fsOv.classList.contains('show')){fsOv.classList.remove('show');fsRevealed=false;fsCurrentId=null}
  document.body.style.overflow='';
  // Clear selection
  selectedItemId=null;clipboardItem=null;hideActionBar();
  document.getElementById('mainApp').style.display='none';
  document.getElementById('lockScreen').style.display='flex';
  const sp=document.getElementById('settingsPanel');if(sp)sp.classList.remove('show');
  initLock();
}

/* ===== AUTO LOCK ===== */
let autoLockTimer=null;
function startAutoLockTimer(){clearTimeout(autoLockTimer);const sec=getAutoLockSec();if(!sec)return;autoLockTimer=setTimeout(()=>{relock();showToast('🔒 자동 잠금',true)},sec*1000)}
function resetAutoLock(){
  const mv=document.getElementById('mainApp').style.display==='block';
  const fs=document.getElementById('fsOverlay').classList.contains('show');
  if(mv||fs){const sp=document.getElementById('settingsPanel');if(sp&&sp.classList.contains('show'))return;startAutoLockTimer()}
}
['click','touchstart','keydown','scroll'].forEach(ev=>document.addEventListener(ev,resetAutoLock,{passive:true}));

/* ===== VISIBILITY ===== */
let anyRevealed=false;
function updateScrambleState(){anyRevealed=!!document.querySelector('.slot-mask.revealed')}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    clearAutoMaskTimer();
    if(anyRevealed){document.querySelectorAll('.slot-mask.revealed').forEach(m=>{const id=m.id.replace('mask_','');const item=findItem(id);if(item)m.textContent='●'.repeat(Math.min(item.secret.length,30));m.classList.remove('revealed');const b=document.getElementById('viewBtn_'+id);if(b){b.textContent='👁️';b.classList.remove('active')}});anyRevealed=false;showToast('🔒 화면 전환 — 텍스트 자동 숨김',true)}
    if(fsRevealed){const mv=document.getElementById('fsMaskView');if(mv&&fsCurrentId){const item=findItem(fsCurrentId);if(item)mv.textContent='●'.repeat(Math.min(item.secret.length,80));mv.classList.remove('revealed');fsRevealed=false;const btn=document.querySelector('.fs-btn-view');if(btn)btn.textContent='👁️ 보기'}}
  }else{resetAutoLock()}
});

/* ===== DATA ===== */
let data={folders:[],loose:[]};
function loadData(){try{const d=JSON.parse(localStorage.getItem(K.DATA))||{folders:[],loose:[]};if(!d.folders)d.folders=[];if(!d.loose)d.loose=[];d.folders.forEach(f=>{if(!f.items)f.items=[]});return d}catch{return{folders:[],loose:[]}}}
function saveData(){localStorage.setItem(K.DATA,JSON.stringify(data));updateCounts()}
let _idc=0;
function mkId(){_idc++;return Date.now().toString(36)+_idc+Math.random().toString(36).slice(2,7)}
function mkItem(){return{id:mkId(),title:'',secret:'',saved:false}}
function mkFolder(name){return{id:mkId(),name:name||'',open:true,items:[]}}
function findItem(id){for(const f of data.folders){const it=f.items.find(i=>i.id===id);if(it)return it}return data.loose.find(i=>i.id===id)}
function findFolder(id){return data.folders.find(f=>f.id===id)}

function initApp(){
  data=loadData();
  if(!data.folders.length&&!data.loose.length){const f=mkFolder('기본 폴더');for(let i=0;i<5;i++)f.items.push(mkItem());data.folders.push(f);for(let i=0;i<3;i++)data.loose.push(mkItem());saveData()}
  renderAll();document.getElementById('setAutoLock').value=getAutoLockSec().toString();document.getElementById('setAutoMask').value=getAutoMaskSec().toString();
}

/* ===== RENDER ===== */
function renderAll(searchTerm){
  const wrap=document.getElementById('contentWrap');const prev=window.scrollY;wrap.innerHTML='';
  const st=(searchTerm||'').trim().toLowerCase();
  data.folders.forEach((f,fi)=>{
    const mi=st?f.items.filter(it=>(it.title||'').toLowerCase().includes(st)):f.items;
    if(st&&!mi.length)return;
    const isOpen=st?true:f.open;
    let h=`<div class="folder" data-fid="${escA(f.id)}"><div class="folder-header" onclick="toggleFolder('${escA(f.id)}')"><span class="folder-toggle ${isOpen?'open':''}">▶</span><input type="text" class="folder-name" value="${escA(f.name)}" placeholder="폴더 이름" maxlength="30" onclick="event.stopPropagation()" onblur="renameFolder('${escA(f.id)}',this.value)" onchange="renameFolder('${escA(f.id)}',this.value)"><span class="folder-count">${f.items.length}개</span><div class="folder-actions">${fi>0?`<button class="folder-btn" onclick="event.stopPropagation();moveFolder('${escA(f.id)}',-1)">▲</button>`:''} ${fi<data.folders.length-1?`<button class="folder-btn" onclick="event.stopPropagation();moveFolder('${escA(f.id)}',1)">▼</button>`:''}<button class="folder-btn" onclick="event.stopPropagation();addSlotInFolder('${escA(f.id)}')">+</button><button class="folder-btn danger" onclick="event.stopPropagation();deleteFolder('${escA(f.id)}')">✕</button></div></div><div class="folder-body ${isOpen?'open':''}">`;
    const ri=st?mi:f.items;ri.forEach((it,ii)=>{h+=buildSlot(it,ii,st)});
    if(!ri.length)h+=`<div style="text-align:center;padding:12px;color:var(--text2);font-size:12px">${st?'검색 결과 없음':'비어있음'}</div>`;
    h+=`</div></div>`;wrap.insertAdjacentHTML('beforeend',h);
  });
  const lm=st?data.loose.filter(it=>(it.title||'').toLowerCase().includes(st)):data.loose;
  if(lm.length||(data.loose.length&&!st)){
    let h=`<div style="margin-top:8px"><div style="padding:6px 12px;font-size:12px;color:var(--text2);font-weight:600;display:flex;align-items:center;gap:6px"><span>📌 폴더 미지정</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px">${data.loose.length}개</span></div>`;
    lm.forEach((it,ii)=>{h+=buildSlot(it,ii,st)});if(st&&!lm.length)h+=`<div style="text-align:center;padding:12px;color:var(--text2);font-size:12px">검색 결과 없음</div>`;h+='</div>';wrap.insertAdjacentHTML('beforeend',h);
  }
  updateCounts();window.scrollTo(0,prev);
  wrap.querySelectorAll('.slot-secret').forEach(ta=>{if(ta.style.display!=='none'&&ta.value)autoGrow(ta)});
}

function buildSlot(item,idx,searchTerm){
  const s=item.saved&&item.secret;const mask=item.secret?'●'.repeat(Math.min(item.secret.length,30)):'';const eid=escA(item.id);
  let hl='';
  if(searchTerm&&item.title){const re=new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');hl=`<div style="font-size:12px;color:var(--accent);padding:0 10px 4px;font-weight:600">${escH(item.title).replace(re,'<span class="highlight">$1</span>')}</div>`}
  const classes=['slot'];if(s)classes.push('saved');if(selectedItemId===eid)classes.push('selected');
  return`<div class="${classes.join(' ')}" id="slot_${eid}" data-id="${eid}">${hl}<div class="slot-top"><input type="text" class="slot-title-input ${s?'readonly':''}" id="title_${eid}" placeholder="제목" value="${escA(item.title)}" maxlength="50" ${s?'readonly':''}><span class="slot-badge ${s?'show':''}" id="badge_${eid}">저장됨</span><div class="slot-btns">${s?`<button class="s-btn s-btn-copy" data-id="${eid}" onclick="copyItem(this.dataset.id)">📋</button><button class="s-btn s-btn-view" data-id="${eid}" onclick="openFullscreen(this.dataset.id)">↗</button>`:`<button class="s-btn s-btn-save" data-id="${eid}" onclick="saveItem(this.dataset.id)">💾</button><button class="s-btn s-btn-view" data-id="${eid}" onclick="openFullscreen(this.dataset.id)">↗</button>`}<button class="s-btn s-btn-del" data-id="${eid}" onclick="deleteItem(this.dataset.id)">✕</button></div></div><div class="slot-body"><textarea class="slot-secret" id="secret_${eid}" placeholder="비밀 텍스트 입력" rows="1" oninput="autoGrow(this)" style="${s?'display:none':''}">${escH(item.secret)}</textarea><div class="slot-mask" id="mask_${eid}" style="${s?'display:block':'display:none'}">${mask}</div></div></div>`;
}

function moveFolder(fid,dir){const idx=data.folders.findIndex(f=>f.id===fid);if(idx<0)return;const ni=idx+dir;if(ni<0||ni>=data.folders.length)return;[data.folders[idx],data.folders[ni]]=[data.folders[ni],data.folders[idx]];saveData();const si=document.getElementById('searchInput');renderAll(si&&si.value?si.value:'')}
function addFolder(){data.folders.push(mkFolder(''));saveData();renderAll();showToast('📁 폴더 추가됨')}

function saveItem(id){const item=findItem(id);if(!item)return;const sec=document.getElementById('secret_'+id);if(!sec||!sec.value.trim()){showToast('⚠️ 비밀 텍스트를 입력하세요',true);return}item.title=document.getElementById('title_'+id).value.trim()||'제목없음';item.secret=sec.value.trim();item.saved=true;saveData();renderAll();showToast('✅ 저장 완료')}
function editItem(id){const item=findItem(id);if(!item)return;item.saved=false;saveData();renderAll();const el=document.getElementById('secret_'+id);if(el){autoGrow(el);el.focus()}}
function toggleView(id){const item=findItem(id);if(!item)return;const m=document.getElementById('mask_'+id),b=document.getElementById('viewBtn_'+id);if(!m)return;if(m.classList.contains('revealed')){m.textContent='●'.repeat(Math.min(item.secret.length,30));m.classList.remove('revealed');if(b){b.textContent='👁️';b.classList.remove('active')}clearAutoMaskTimer()}else{m.textContent=item.secret;m.classList.add('revealed');if(b){b.textContent='🙈';b.classList.add('active')}startAutoMaskTimer()}updateScrambleState()}
function copyItem(id){const item=findItem(id);if(!item||!item.secret){showToast('⚠️ 비어있습니다',true);return}clipCopy(item.secret);showToast('📋 복사 완료')}
function deleteItem(id){const item=findItem(id);if(!item)return;const doD=()=>{if(selectedItemId===id){selectedItemId=null;clipboardItem=null;hideActionBar()}for(const f of data.folders)f.items=f.items.filter(i=>i.id!==id);data.loose=data.loose.filter(i=>i.id!==id);saveData();renderAll();showToast('🗑️ 삭제 완료')};if(item.secret||item.title){showModal('항목 삭제',`"${item.title||'제목없음'}" 삭제할까요?`,'삭제',()=>{doD();closeModal()})}else doD()}
function autoGrow(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}

/* ===== FULLSCREEN ===== */
let fsCurrentId=null,fsRevealed=false;
function openFullscreen(id){
  const item=findItem(id);if(!item)return;fsCurrentId=id;fsRevealed=false;
  const ov=document.getElementById('fsOverlay'),ti=document.getElementById('fsTitle'),ta=document.getElementById('fsTextarea'),mv=document.getElementById('fsMaskView'),ac=document.getElementById('fsActions');
  if(item.saved){ti.value=item.title;ti.classList.add('readonly');ti.readOnly=true;ta.style.display='none';mv.style.display='block';mv.textContent='●'.repeat(Math.min(item.secret.length,80));mv.classList.remove('revealed');ac.innerHTML=`<button class="fs-btn fs-btn-view" onclick="fsToggleView()">👁️ 보기</button><button class="fs-btn fs-btn-copy" onclick="fsCopy()">📋 복사</button><button class="fs-btn fs-btn-edit" onclick="fsEdit()">✏️ 수정</button>`}
  else{ti.classList.remove('readonly');ti.readOnly=false;ta.style.display='block';mv.style.display='none';const iTA=document.getElementById('secret_'+id),iTi=document.getElementById('title_'+id);ta.value=iTA?iTA.value:(item.secret||'');ti.value=iTi?iTi.value:(item.title||'');ac.innerHTML=`<button class="fs-btn fs-btn-save" onclick="fsSave()">💾 저장</button>`}
  ov.classList.add('show');document.body.style.overflow='hidden';
}
function closeFullscreen(){
  document.getElementById('fsOverlay').classList.remove('show');document.body.style.overflow='';
  if(fsCurrentId){const item=findItem(fsCurrentId);if(item&&!item.saved){const ta=document.getElementById('fsTextarea'),ti=document.getElementById('fsTitle'),iTA=document.getElementById('secret_'+fsCurrentId),iTi=document.getElementById('title_'+fsCurrentId);if(iTA)iTA.value=ta.value;if(iTi)iTi.value=ti.value;if(iTA)autoGrow(iTA)}}
  const mv=document.getElementById('fsMaskView');if(mv){mv.classList.remove('revealed');mv.textContent=''}fsRevealed=false;fsCurrentId=null;
}
function fsToggleView(){const item=findItem(fsCurrentId);if(!item)return;const mv=document.getElementById('fsMaskView'),btn=document.querySelector('.fs-btn-view');if(fsRevealed){mv.textContent='●'.repeat(Math.min(item.secret.length,80));mv.classList.remove('revealed');if(btn)btn.textContent='👁️ 보기';fsRevealed=false;clearAutoMaskTimer()}else{mv.textContent=item.secret;mv.classList.add('revealed');if(btn)btn.textContent='🙈 숨기기';fsRevealed=true;startAutoMaskTimer()}}
function fsCopy(){const item=findItem(fsCurrentId);if(!item||!item.secret)return;clipCopy(item.secret);showToast('📋 복사 완료')}
function fsEdit(){const item=findItem(fsCurrentId);if(!item)return;item.saved=false;saveData();renderAll();const ti=document.getElementById('fsTitle'),ta=document.getElementById('fsTextarea'),mv=document.getElementById('fsMaskView'),ac=document.getElementById('fsActions');ti.classList.remove('readonly');ti.readOnly=false;ta.style.display='block';ta.value=item.secret;mv.style.display='none';fsRevealed=false;ac.innerHTML=`<button class="fs-btn fs-btn-save" onclick="fsSave()">💾 저장</button>`;ta.focus()}
function fsSave(){const item=findItem(fsCurrentId);if(!item)return;const ta=document.getElementById('fsTextarea'),ti=document.getElementById('fsTitle'),secret=ta.value.trim();if(!secret){showToast('⚠️ 비밀 텍스트를 입력하세요',true);return}item.title=ti.value.trim()||'제목없음';item.secret=secret;item.saved=true;saveData();renderAll();ti.classList.add('readonly');ti.readOnly=true;ta.style.display='none';const mv=document.getElementById('fsMaskView');mv.style.display='block';mv.textContent='●'.repeat(Math.min(item.secret.length,80));mv.classList.remove('revealed');fsRevealed=false;document.getElementById('fsActions').innerHTML=`<button class="fs-btn fs-btn-view" onclick="fsToggleView()">👁️ 보기</button><button class="fs-btn fs-btn-copy" onclick="fsCopy()">📋 복사</button><button class="fs-btn fs-btn-edit" onclick="fsEdit()">✏️ 수정</button>`;showToast('✅ 저장 완료')}

function updateCounts(){let t=data.loose.length,s=data.loose.filter(i=>i.saved).length;data.folders.forEach(f=>{t+=f.items.length;s+=f.items.filter(i=>i.saved).length});document.getElementById('countText').textContent=`${t}개`;document.getElementById('savedCount').textContent=`저장 ${s}`}

/* ===== DOUBLE-TAP SELECTION ===== */
let lastTapTime=0,lastTapId='',scrolling=false,scrollTimer=null;

// Detect scrolling to prevent double-tap during scroll
document.addEventListener('scroll',()=>{scrolling=true;clearTimeout(scrollTimer);scrollTimer=setTimeout(()=>scrolling=false,300)},{passive:true});

// Double-tap on contentWrap
document.getElementById('contentWrap').addEventListener('click',function(e){
  // Ignore clicks on buttons, inputs, textareas
  if(e.target.closest('.s-btn,.folder-btn,.folder-name,.slot-title-input,.slot-secret,button,input,textarea'))return;
  const slot=e.target.closest('.slot[data-id]');
  if(!slot)return;
  const id=slot.dataset.id;
  const item=findItem(id);
  if(!item||!item.saved)return; // Only saved items
  if(scrolling)return;

  const now=Date.now();
  if(lastTapId===id&&now-lastTapTime<400){
    // Double tap detected
    selectItem(id);
    lastTapTime=0;lastTapId='';
  }else{
    lastTapTime=now;lastTapId=id;
  }
});

function selectItem(id){
  if(selectedItemId===id){deselectItem();return}
  selectedItemId=id;
  vib(20);
  renderAll();
  showActionBar();
}

function deselectItem(){
  selectedItemId=null;clipboardItem=null;
  hideActionBar();
  renderAll();
}

function showActionBar(){
  const bar=document.getElementById('actionBar');
  bar.innerHTML=`
    <button class="ab-btn ab-btn-up" onclick="moveItem(-1)">▲</button>
    <button class="ab-btn ab-btn-down" onclick="moveItem(1)">▼</button>
    <button class="ab-btn ab-btn-cut" onclick="cutItem()">✂️ 이동</button>
    <button class="ab-btn ab-btn-cancel" onclick="deselectItem()">✕</button>
  `;
  bar.classList.add('show');
}

function hideActionBar(){
  const bar=document.getElementById('actionBar');
  bar.classList.remove('show');
  bar.innerHTML='';
}

// Find which folder/loose an item belongs to + index
function findItemLocation(id){
  for(const f of data.folders){const idx=f.items.findIndex(i=>i.id===id);if(idx>=0)return{type:'folder',folder:f,idx}}
  const idx=data.loose.findIndex(i=>i.id===id);if(idx>=0)return{type:'loose',idx};
  return null;
}

function moveItem(dir){
  if(!selectedItemId)return;
  const loc=findItemLocation(selectedItemId);if(!loc)return;
  const arr=loc.type==='folder'?loc.folder.items:data.loose;
  const ni=loc.idx+dir;
  if(ni<0||ni>=arr.length)return;
  [arr[loc.idx],arr[ni]]=[arr[ni],arr[loc.idx]];
  vib(15);saveData();renderAll();showActionBar();
}

function cutItem(){
  if(!selectedItemId)return;
  const loc=findItemLocation(selectedItemId);if(!loc)return;
  const item=findItem(selectedItemId);if(!item)return;
  clipboardItem={id:selectedItemId,itemData:{...item},fromType:loc.type,fromFolderId:loc.type==='folder'?loc.folder.id:null};
  // Remove from original location
  if(loc.type==='folder'){loc.folder.items.splice(loc.idx,1)}
  else{data.loose.splice(loc.idx,1)}
  selectedItemId=null;
  saveData();renderAll();
  showToast('✂️ 항목 잘라냄 — 폴더를 선택하고 붙여넣기');
  // Show paste button globally
  showPasteMode();
}

function showPasteMode(){
  const bar=document.getElementById('actionBar');
  bar.classList.add('show');
  bar.innerHTML=`
    <button class="ab-btn ab-btn-paste" onclick="pasteToLoose()">📌 폴더 미지정에 붙여넣기</button>
    <button class="ab-btn ab-btn-cancel" onclick="cancelPaste()">✕ 취소</button>
  `;
  // Add paste buttons to each folder header
  document.querySelectorAll('.folder').forEach(fd=>{
    const fid=fd.dataset.fid;
    const header=fd.querySelector('.folder-actions');
    if(header){
      const btn=document.createElement('button');
      btn.className='folder-btn';btn.style.cssText='background:rgba(0,212,255,.2);color:var(--accent)';
      btn.textContent='📌';btn.title='여기에 붙여넣기';
      btn.onclick=function(e){e.stopPropagation();pasteToFolder(fid)};
      header.prepend(btn);
    }
  });
}

function pasteToFolder(fid){
  if(!clipboardItem)return;
  const f=findFolder(fid);if(!f)return;
  f.items.push(clipboardItem.itemData);
  if(!f.open)f.open=true;
  clipboardItem=null;selectedItemId=null;
  saveData();renderAll();hideActionBar();
  showToast('📌 붙여넣기 완료');
}

function pasteToLoose(){
  if(!clipboardItem)return;
  data.loose.push(clipboardItem.itemData);
  clipboardItem=null;selectedItemId=null;
  saveData();renderAll();hideActionBar();
  showToast('📌 붙여넣기 완료');
}

function cancelPaste(){
  if(clipboardItem){
    // Restore item to original location
    if(clipboardItem.fromType==='folder'){
      const f=findFolder(clipboardItem.fromFolderId);
      if(f)f.items.push(clipboardItem.itemData);
      else data.loose.push(clipboardItem.itemData);
    }else{
      data.loose.push(clipboardItem.itemData);
    }
    saveData();
  }
  clipboardItem=null;selectedItemId=null;
  renderAll();hideActionBar();
  showToast('↩️ 이동 취소');
}

/* ===== SETTINGS ===== */
let setVerifiedPin=false,setVerifiedPat=false,setNewLockTypeVal='pin',setNewPatCode='',_bothPinSaved=false;

function toggleSettings(){
  const p=document.getElementById('settingsPanel');p.classList.toggle('show');
  if(p.classList.contains('show')){
    setVerifiedPin=false;setVerifiedPat=false;_bothPinSaved=false;
    document.getElementById('setStep1').style.display='block';document.getElementById('setStep2').style.display='none';document.getElementById('setVerifyErr').textContent='\u00A0';
    const mode=getLockMode(),nP=mode==='pin'||mode==='both',nPt=mode==='pattern'||mode==='both';
    document.getElementById('setVerifyPinArea').style.display=nP?'block':'none';document.getElementById('setVerifyPatArea').style.display=nPt?'block':'none';
    if(nP)document.getElementById('setVerifyPin').value='';
    if(nPt)setTimeout(()=>initPat('setVerifyPatArea2',200,handleSetVerifyPat),100);
    if(mode==='both'){document.getElementById('setVerifyBothInfo').style.display='block';document.getElementById('setVerifyBothInfo').textContent='PIN과 패턴 모두 확인이 필요합니다'}else{document.getElementById('setVerifyBothInfo').style.display='none'}
  }else{const nv=document.getElementById('setNewPin');if(nv)nv.value='';const nc=document.getElementById('setNewPinCf');if(nc)nc.value='';setNewPatCode=''}
}

async function verifySettingsPw(){
  const pin=document.getElementById('setVerifyPin').value,err=document.getElementById('setVerifyErr');
  if(!pin){err.textContent='❌ PIN을 입력하세요';return}
  const h=await sha256(pin);if(h!==localStorage.getItem(K.PIN)){err.textContent='❌ PIN이 틀립니다';document.getElementById('setVerifyPin').value='';return}
  setVerifiedPin=true;err.textContent='\u00A0';
  if(getLockMode()==='both'&&!setVerifiedPat){const info=document.getElementById('setVerifyBothInfo');if(info){info.textContent='✅ PIN 확인 완료 — 패턴을 그려주세요';info.style.display='block'}}
  checkSetVerifyDone();
}
async function handleSetVerifyPat(code,inst){
  const err=document.getElementById('setVerifyErr');if(code.length<4){inst.showErr();return}
  const h=await sha256(code);if(h!==localStorage.getItem(K.PAT)){err.textContent='❌ 패턴이 틀립니다';inst.showErr();return}
  setVerifiedPat=true;err.textContent='\u00A0';checkSetVerifyDone();
}
function checkSetVerifyDone(){
  const mode=getLockMode(),nP=mode==='pin'||mode==='both',nPt=mode==='pattern'||mode==='both';
  if(nP&&!setVerifiedPin)return;if(nPt&&!setVerifiedPat)return;
  document.getElementById('setStep1').style.display='none';document.getElementById('setStep2').style.display='block';
  setNewLockTypeVal=getLockMode();updateSetNewLockUI();
  setTimeout(()=>initPat('setNewPatArea2',200,handleSetNewPat),100);
  document.getElementById('setAutoLock').value=getAutoLockSec().toString();
  document.getElementById('setAutoMask').value=getAutoMaskSec().toString();
}

function setNewLockType(t){setNewLockTypeVal=t;updateSetNewLockUI()}
function updateSetNewLockUI(){
  ['setOptPin','setOptPat','setOptBoth'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById({pin:'setOptPin',pattern:'setOptPat',both:'setOptBoth'}[setNewLockTypeVal]).classList.add('active');
  const nP=setNewLockTypeVal==='pin'||setNewLockTypeVal==='both',nPt=setNewLockTypeVal==='pattern'||setNewLockTypeVal==='both';
  document.getElementById('setNewPinArea').style.display=nP?'block':'none';document.getElementById('setNewPatArea').style.display=nPt?'block':'none';
  const pb=document.getElementById('btnSaveNewPin'),ptb=document.getElementById('btnSaveNewPat');
  if(setNewLockTypeVal==='both'){if(pb)pb.textContent='PIN 저장';if(ptb)ptb.textContent='패턴 저장'}else{if(pb)pb.textContent='저장';if(ptb)ptb.textContent='저장'}
}

async function saveNewPin(){
  const nw=document.getElementById('setNewPin').value,cf=document.getElementById('setNewPinCf').value,err=document.getElementById('setNewPinErr');
  if(!/^\d{6}$/.test(nw)){err.textContent='❌ 숫자 6자리를 입력하세요';return}if(nw!==cf){err.textContent='❌ PIN이 일치하지 않습니다';return}
  const h=await sha256(nw);localStorage.setItem(K.PIN,h);err.textContent='\u00A0';document.getElementById('setNewPin').value='';document.getElementById('setNewPinCf').value='';
  if(setNewLockTypeVal==='pin'){localStorage.setItem(K.MODE,'pin');localStorage.removeItem(K.PAT);toggleSettings();showToast('✅ PIN 변경 완료')}
  else if(setNewLockTypeVal==='both'){_bothPinSaved=true;showToast('✅ PIN 저장됨 — 패턴도 설정하세요');err.textContent='✅ PIN 저장 완료'}
}

function handleSetNewPat(code,inst){if(code.length<4){document.getElementById('setNewPatErr').textContent='⚠️ 최소 4개 점';inst.showErr();setNewPatCode='';return}setNewPatCode=code;document.getElementById('setNewPatErr').textContent='✅ 패턴 입력됨 — "저장" 클릭'}
function resetSetNewPat(){setNewPatCode='';document.getElementById('setNewPatErr').textContent='\u00A0';if(patInstances['setNewPatArea2'])patInstances['setNewPatArea2'].reset()}
async function saveNewPat(){
  if(!setNewPatCode||setNewPatCode.length<4){document.getElementById('setNewPatErr').textContent='❌ 패턴을 먼저 그려주세요';return}
  const h=await sha256(setNewPatCode);localStorage.setItem(K.PAT,h);setNewPatCode='';
  if(setNewLockTypeVal==='pattern'){localStorage.setItem(K.MODE,'pattern');localStorage.removeItem(K.PIN);toggleSettings();showToast('✅ 패턴 변경 완료')}
  else if(setNewLockTypeVal==='both'){if(!_bothPinSaved&&!localStorage.getItem(K.PIN)){document.getElementById('setNewPatErr').textContent='⚠️ PIN도 먼저 설정하세요';return}localStorage.setItem(K.MODE,'both');_bothPinSaved=false;toggleSettings();showToast('✅ 이중 잠금 설정 완료')}
}

function saveAutoLock(){const v=document.getElementById('setAutoLock').value;localStorage.setItem(K.AUTOLOCK,v);startAutoLockTimer();showToast(v==='0'?'⏰ 자동 잠금 해제':`⏰ 자동 잠금 ${parseInt(v)/60}분`)}

['setVerifyPin','setNewPin','setNewPinCf'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'')})});

/* ===== EXPORT/IMPORT ===== */
async function deriveKey(pw,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
function uint8ToB64(a){let b='';const c=8192;for(let i=0;i<a.length;i+=c)b+=String.fromCharCode.apply(null,a.subarray(i,i+c));return btoa(b)}
function b64ToUint8(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a}
async function encryptData(pt,pw){const s=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),k=await deriveKey(pw,s),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(pt)),buf=new Uint8Array(s.length+iv.length+ct.byteLength);buf.set(s,0);buf.set(iv,16);buf.set(new Uint8Array(ct),28);return uint8ToB64(buf)}
async function decryptData(b,pw){const r=b64ToUint8(b),s=r.slice(0,16),iv=r.slice(16,28),ct=r.slice(28),k=await deriveKey(pw,s);return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv},k,ct))}

/* ── 비밀번호 입력 모달 (prompt 대체) ── */
let _pwResolve=null;
function openPwModal(title,msg){
  return new Promise((resolve)=>{
    _pwResolve=resolve;
    document.getElementById('pwModalTitle').textContent=title;
    document.getElementById('pwModalMsg').textContent=msg;
    document.getElementById('pwModalInput').value='';
    document.getElementById('pwModalErr').textContent='\u00A0';
    document.getElementById('pwModalOverlay').classList.add('show');
    setTimeout(()=>document.getElementById('pwModalInput').focus(),150);
  });
}
function confirmPwModal(){
  const pw=document.getElementById('pwModalInput').value;
  if(!pw){document.getElementById('pwModalErr').textContent='비밀번호를 입력하세요';return}
  if(pw.length<4){document.getElementById('pwModalErr').textContent='4자 이상 입력하세요';return}
  document.getElementById('pwModalOverlay').classList.remove('show');
  if(_pwResolve){_pwResolve(pw);_pwResolve=null}
}
function cancelPwModal(){
  document.getElementById('pwModalOverlay').classList.remove('show');
  if(_pwResolve){_pwResolve(null);_pwResolve=null}
}
document.getElementById('pwModalInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmPwModal()});

async function exportData(){
  const pw=await openPwModal('📤 백업 암호화','비밀번호를 입력하세요 (기억해야 복원 가능)');
  if(!pw){showToast('⚠️ 취소됨',true);return}
  try{const obj={mode:getLockMode(),pin:localStorage.getItem(K.PIN)||'',pat:localStorage.getItem(K.PAT)||'',data,autolock:getAutoLockSec()};const enc=await encryptData(JSON.stringify(obj),pw);const blob=new Blob([JSON.stringify({version:2,encrypted:enc})],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='secret_vault_backup_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('📤 암호화 백업 완료')}catch{showToast('❌ 내보내기 실패',true)}
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=async function(e){try{const obj=JSON.parse(e.target.result);if(obj.version===2&&obj.encrypted){const pw=await openPwModal('📥 백업 복원','백업 파일의 암호화 비밀번호');if(!pw){showToast('⚠️ 취소됨',true);return}try{applyImport(JSON.parse(await decryptData(obj.encrypted,pw)))}catch{showToast('❌ 비밀번호가 틀리거나 파일 손상',true)}}else if(obj.version===1&&obj.data){applyImport(obj)}else{showToast('❌ 올바른 백업 파일이 아닙니다',true)}}catch{showToast('❌ 파일 파싱 실패',true)}};reader.readAsText(file);event.target.value='';
}
function applyImport(obj){showModal('데이터 가져오기','현재 데이터가 모두 교체됩니다. 계속할까요?','가져오기',()=>{if(obj.mode)localStorage.setItem(K.MODE,obj.mode);if(obj.pin)localStorage.setItem(K.PIN,obj.pin);if(obj.pat)localStorage.setItem(K.PAT,obj.pat);if(obj.autolock!==undefined)localStorage.setItem(K.AUTOLOCK,obj.autolock.toString());const d=obj.data||{};if(!d.folders)d.folders=[];if(!d.loose)d.loose=[];d.folders.forEach(f=>{if(!f.items)f.items=[]});data=d;saveData();renderAll();closeModal();showToast('✅ 데이터 가져오기 완료')})}

function clipCopy(t){if(navigator.clipboard)navigator.clipboard.writeText(t).catch(()=>fbCopy(t));else fbCopy(t)}
function fbCopy(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0;left:-9999px';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)}
function showModal(t,m,ct,fn){document.getElementById('modalTitle').textContent=t;document.getElementById('modalMsg').textContent=m;const b=document.getElementById('modalConfirm');b.textContent=ct;b.onclick=fn;document.getElementById('modalOverlay').classList.add('show')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

initLock();
</script>
