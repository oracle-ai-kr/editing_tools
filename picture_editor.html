<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>모바일 그림판 v2 업그레이드</title>
<style>
:root{
  --bg:#151a20; --panel:#1f2630; --panel2:#293241; --line:#3c4758; --text:#edf2f8;
  --active:#23446f; --active-line:#69a6ff; --top-h:44px; --slide-h:56px; --tabbar-h:38px;
}
.tabbar{
  height:var(--tabbar-h);flex-shrink:0;display:flex;align-items:center;
  background:var(--bg);border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;z-index:30;
}
.tabbar::-webkit-scrollbar{display:none}
.tab-item{
  display:inline-flex;align-items:center;gap:6px;height:100%;padding:0 14px;
  white-space:nowrap;font-size:12px;font-weight:700;color:#9baabb;cursor:pointer;
  border-right:1px solid var(--line);flex-shrink:0;max-width:160px;min-width:90px;
  touch-action:manipulation;user-select:none;transition:background .1s,color .1s;
  box-sizing:border-box;
}
.tab-item.active{background:var(--panel);color:var(--text);border-bottom:2px solid var(--active-line);margin-bottom:-1px;}
.tab-item .tab-name{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.tab-close{
  width:20px!important;height:20px!important;border-radius:50%!important;display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;color:#6a7a8a;background:transparent;border:none;padding:0;min-width:unset!important;
  touch-action:manipulation;cursor:pointer;
}
.tab-close:active{background:rgba(255,100,100,.3)!important;color:#ff8080!important;}
.tab-add{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:36px;height:100%;flex-shrink:0;font-size:18px;color:#9baabb;cursor:pointer;
  touch-action:manipulation;border:none;background:transparent;padding:0;border-radius:0;
}
.tab-add:active{color:var(--text);background:var(--panel2)!important;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
body{touch-action:manipulation}
.slidebar input[type=color]{touch-action:auto;pointer-events:auto}
.slidebar input[type=range]{touch-action:none}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.topbar{
  height:calc(var(--top-h) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);
  display:flex;align-items:center;gap:6px;padding-left:8px;padding-right:8px;
  background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;z-index:40;
}
.tabs{display:flex;gap:6px;overflow:auto;flex:1;min-width:0;scrollbar-width:none}
.tabs::-webkit-scrollbar,.panel::-webkit-scrollbar,.slide-inner::-webkit-scrollbar,.selection-bar::-webkit-scrollbar{display:none}
button{
  font:inherit;border:1px solid var(--line);background:var(--panel2);color:var(--text);
  height:30px;min-width:30px;border-radius:10px;padding:0 10px;display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;cursor:pointer;touch-action:manipulation;
}
.tab-btn.active,.icon-btn.active,.action-btn.active,.tool-btn.active,.mini-btn.active{
  background:var(--active);border-color:var(--active-line);color:#dcebff;
}
.icon-btn.on{background:#1f3d2a;border-color:#4c8d63;color:#ddffeb}
#textToolBtn.on{background:var(--active);border-color:var(--active-line);color:#dcebff;}
.panel-wrap{position:relative;z-index:35;flex-shrink:0}
.panel{
  display:none;gap:8px;overflow:auto;white-space:nowrap;align-items:center;
  background:var(--panel);border-bottom:1px solid var(--line);padding:6px 8px;scrollbar-width:none;
}
.panel.open{display:flex}
.group{display:inline-flex;align-items:center;gap:6px;padding-right:8px;margin-right:4px;border-right:1px solid var(--line)}
.group:last-child{border-right:none;padding-right:0;margin-right:0}
.canvas-wrap{position:relative;flex:1;min-height:0;background:#11161d;overflow:hidden}
#canvas{display:block;width:100%;height:100%;background:#11161d;touch-action:none}
.slidebar{
  position:absolute;left:0;right:0;bottom:0;z-index:60;height:calc(var(--slide-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);background:rgba(31,38,48,.98);border-top:1px solid var(--line);
  transform:translateY(100%);transition:transform .18s ease;pointer-events:none; will-change:transform;
}
.slidebar.show{transform:translateY(0);pointer-events:auto}
.slide-inner{height:100%;display:flex;align-items:center;gap:8px;padding:8px;overflow:auto;white-space:nowrap;scrollbar-width:none}
.chip{display:inline-flex;align-items:center;gap:8px;height:32px;padding:0 10px;border-radius:10px;background:var(--panel2);border:1px solid var(--line)}
.chip input{pointer-events:auto;touch-action:auto}
input[type=color]{width:32px;height:28px;border:0;background:transparent;padding:0;cursor:pointer;touch-action:auto;-webkit-appearance:none;border-radius:4px;}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:3px}
input[type=range]{width:110px;touch-action:none}
.selection-bar{
  position:absolute;left:50%;transform:translateX(-50%);bottom:12px;z-index:32;display:none;gap:6px;max-width:calc(100% - 12px);
  overflow:auto;white-space:nowrap;background:rgba(31,38,48,.98);border:1px solid var(--line);border-radius:12px;padding:6px;scrollbar-width:none;
}
.selection-bar.show{display:flex}
.selection-bar.with-slide{bottom:calc(var(--slide-h) + env(safe-area-inset-bottom) + 10px)}
.toast{
  position:absolute;left:50%;transform:translateX(-50%);bottom:22px;z-index:33;background:rgba(10,14,19,.92);color:#fff;
  border:1px solid rgba(255,255,255,.12);padding:9px 14px;border-radius:12px;font-size:13px;font-weight:700;
  opacity:0;pointer-events:none; will-change:transform;transition:opacity .15s ease;max-width:calc(100% - 24px);white-space:nowrap;
}
.toast.show{opacity:1}
.toast.with-slide{bottom:calc(var(--slide-h) + env(safe-area-inset-bottom) + 18px)}
.hidden{display:none!important}
.selection-bar .mini-btn{
  width:52px;height:52px;border-radius:14px;padding:0;
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--panel2);border:1px solid var(--line);color:var(--text);
  transition:background .12s,border-color .12s;
}
.selection-bar .mini-btn:active{background:var(--active);border-color:var(--active-line);}
/* 원본 불러오기 체크박스 */
.import-orig-wrap{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 8px;
  border-radius:10px;border:1px solid var(--line);background:var(--panel2);cursor:pointer;touch-action:manipulation;user-select:none;}
.import-orig-wrap input[type=checkbox]{width:15px;height:15px;accent-color:#69a6ff;cursor:pointer;touch-action:manipulation;flex-shrink:0;}
.import-orig-wrap span{font-size:11px;font-weight:700;color:#9baabb;white-space:nowrap;}
.import-orig-wrap.on span{color:#dcebff;}
/* 해상도 토글 */
#resToggleBtn{min-width:28px;width:28px;padding:0;font-size:13px;}
#resGroup{display:inline-flex;align-items:center;gap:6px;overflow:hidden;transition:max-width .2s ease,opacity .2s ease;max-width:300px;opacity:1;}
#resGroup.collapsed{max-width:0;opacity:0;pointer-events:none;}

/* 인라인 오버레이 모달 */
.overlay-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .18s ease;
}
.overlay-modal.show{opacity:1;pointer-events:auto;}
.overlay-sheet{
  width:100%;max-width:480px;
  background:var(--panel);border:1px solid var(--line);
  border-radius:18px 18px 0 0;
  padding:20px 16px calc(16px + env(safe-area-inset-bottom));
  transform:translateY(20px);transition:transform .18s ease;
}
.overlay-modal.show .overlay-sheet{transform:translateY(0);}
.overlay-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;letter-spacing:-.2px;}
.overlay-input{
  width:100%;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;color:var(--text);font-size:15px;
  padding:11px 13px;outline:none;
  transition:border-color .15s;box-sizing:border-box;
  -webkit-appearance:none;
}
.overlay-input:focus{border-color:#69a6ff;}
.overlay-textarea{
  width:100%;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;color:var(--text);font-size:15px;
  padding:11px 13px;outline:none;resize:none;
  min-height:90px;line-height:1.5;
  transition:border-color .15s;box-sizing:border-box;
  -webkit-appearance:none;
}
.overlay-textarea:focus{border-color:#69a6ff;}
.overlay-btns{display:flex;gap:8px;margin-top:12px;}
.overlay-btn{
  flex:1;height:44px;border-radius:12px;font-size:14px;font-weight:800;
  border:1px solid var(--line);background:var(--panel2);color:var(--text);
  cursor:pointer;touch-action:manipulation;
}
.overlay-btn.primary{background:#23446f;border-color:#69a6ff;color:#dcebff;}
.overlay-hint{font-size:11px;color:#6a7a8a;margin-top:7px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="tabs">
      <button class="tab-btn" data-panel="filePanel" type="button">파일</button>
      <button class="tab-btn" data-panel="editPanel" type="button">편집</button>
      <button class="tab-btn" data-panel="toolPanel" type="button">도구</button>
      <button id="noneToolBtn" type="button" style="background:var(--panel);border-color:var(--panel);color:var(--panel);min-width:30px;width:30px;"></button>
    </div>
    <button id="textToolBtn" class="icon-btn" type="button" title="텍스트">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <button id="fitViewBtn" class="icon-btn" type="button" title="화면 맞춤">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
    <button id="slideToggle" class="icon-btn" type="button">⌄</button>
  </div>

  <div class="panel-wrap">
    <div id="filePanel" class="panel">
      <div class="group">
        <button id="importBtn" class="action-btn" type="button" title="불러오기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 17 15 14"/></svg>
        </button>
        <button id="importOrigBtn" class="action-btn" type="button" title="원본 크기로 불러오기">원본</button>
        <button id="saveBtn" class="action-btn" type="button" title="저장">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
      </div>
      <div class="group">
        <button id="resToggleBtn" class="action-btn" type="button" title="해상도 펼치기/접기">▶</button>
        <div id="resGroup">
          <button class="res-btn action-btn" data-w="1600" data-h="2400" type="button" title="기본 해상도">기본</button>
          <button class="res-btn action-btn" data-w="1920" data-h="2880" type="button" title="FHD">FHD</button>
          <button class="res-btn action-btn" data-w="2560" data-h="3840" type="button" title="2K">2K</button>
          <button class="res-btn action-btn" data-w="3840" data-h="5760" type="button" title="4K">4K</button>
        </div>
      </div>
      <input id="fileInput" class="hidden" type="file" accept="image/png,image/jpeg" />
    </div>

    <div id="editPanel" class="panel">
      <div class="group">
        <button id="undoBtn" class="action-btn" type="button" title="되돌리기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
        </button>
        <button id="clearBtn" class="action-btn" type="button" title="전체지우기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>
      <div class="group">
        <button id="selectRectBtn" class="action-btn" type="button" title="사각선택">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
        </button>
        <button id="selectEllipseBtn" class="action-btn" type="button" title="원선택">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 2"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>
        </button>
        <button id="selectAllBtn" class="action-btn" type="button" title="모두선택">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18"/><path d="M15 3v18"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
        </button>
        <button id="pasteBtn" class="action-btn" type="button" title="붙여넣기" style="color:#555e6e">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        </button>
      </div>
    </div>

    <div id="toolPanel" class="panel">
      <div class="group">
        <button class="tool-btn" data-tool="pen" type="button" title="펜">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" type="button" title="지우개">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l10-10 7 7-1.5 1.5"/><path d="M6.5 17.5l5-5"/></svg>
        </button>
        <button class="tool-btn" data-tool="fill" type="button" title="색채우기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11L8.93 2.36a1 1 0 0 0-1.41.15L3.59 7.4a1 1 0 0 0 .04 1.38L13 17"/><path d="M19 11c0 0 2 2.5 2 4a2 2 0 0 1-4 0c0-1.5 2-4 2-4z"/><line x1="3" y1="21" x2="21" y2="21"/></svg>
        </button>
        <button class="tool-btn" data-tool="eyedropper" type="button" title="스포이드">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22l1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="M15 6l3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8"/></svg>
        </button>
      </div>
      <div class="group">
        <button class="tool-btn" data-tool="line" type="button" title="직선">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="4"/></svg>
        </button>
        <button class="tool-btn" data-tool="dashed" type="button" title="점선">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"><line x1="4" y1="20" x2="20" y2="4"/></svg>
        </button>
        <button class="tool-btn" data-tool="rect" type="button" title="사각형">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="diamond" type="button" title="마름모">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 12 12 22 2 12"/></svg>
        </button>
        <button class="tool-btn" data-tool="ellipse" type="button" title="원">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>
        </button>
        <button class="tool-btn" data-tool="arrow" type="button" title="화살표">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9 5 19 5 19 15"/></svg>
        </button>
      </div>
    </div>
  </div><!-- /panel-wrap -->

  <div class="tabbar" id="tabbar">
    <!-- tabs injected by JS -->
    <button class="tab-add" id="tabAddBtn" type="button" title="새 탭">＋</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="selectionBar" class="selection-bar">
      <button id="miniCopy" class="mini-btn" type="button" title="복사">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button id="miniCut" class="mini-btn" type="button" title="잘라내기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="20" r="3"/><circle cx="6" cy="4" r="3"/><line x1="6" y1="7" x2="6" y2="17"/><line x1="6" y1="7" x2="21" y2="22"/><line x1="6" y1="17" x2="21" y2="2"/></svg>
      </button>
      <button id="miniDelete" class="mini-btn" type="button" title="삭제">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
    <div id="toast" class="toast"></div>
    <div id="slidebar" class="slidebar">
      <div class="slide-inner">
        <div class="chip">🎨 <input id="colorInput" type="color" value="#111111"></div>
        <div class="chip">↔ <input id="sizeInput" type="range" min="1" max="60" value="4"><span id="sizeText">4</span></div>
      </div>
    </div>
  </div>
</div>

<!-- 텍스트 입력 오버레이 -->
<div class="overlay-modal" id="textOverlay">
  <div class="overlay-sheet">
    <div class="overlay-title">텍스트 입력</div>
    <textarea class="overlay-textarea" id="textOverlayInput" placeholder="텍스트를 입력하세요&#10;(줄바꿈 가능)"></textarea>
    <div class="overlay-hint">확인을 누르면 캔버스에 배치됩니다.</div>
    <div class="overlay-btns">
      <button class="overlay-btn" id="textOverlayCancel">취소</button>
      <button class="overlay-btn primary" id="textOverlayConfirm">확인</button>
    </div>
  </div>
</div>

<!-- 저장 파일명 오버레이 -->
<div class="overlay-modal" id="saveOverlay">
  <div class="overlay-sheet">
    <div class="overlay-title">파일 저장</div>
    <input class="overlay-input" id="saveOverlayInput" type="text" placeholder="drawing.png" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="overlay-hint">확장자: .png 또는 .jpg</div>
    <div class="overlay-btns">
      <button class="overlay-btn" id="saveOverlayCancel">취소</button>
      <button class="overlay-btn primary" id="saveOverlayConfirm">저장</button>
    </div>
  </div>
</div>

<!-- 범용 확인 오버레이 -->
<div class="overlay-modal" id="confirmOverlay">
  <div class="overlay-sheet">
    <div class="overlay-title" id="confirmOverlayTitle">확인</div>
    <div style="font-size:13px;color:#9baabb;line-height:1.5;margin-bottom:4px;" id="confirmOverlayMsg"></div>
    <div class="overlay-btns">
      <button class="overlay-btn" id="confirmOverlayCancel">취소</button>
      <button class="overlay-btn primary" style="background:#7a2020;border-color:#ff6060;color:#ffd0d0;" id="confirmOverlayOk">확인</button>
    </div>
  </div>
</div>

<script>
(() => {
  const STORAGE_KEY = 'mobile_paint_v24';
  const MAX_TABS = 5;
  const HISTORY_LIMIT = 20;

  const RESOLUTIONS = {
    'base': { w: 1600, h: 2400, label: '기본' },
    'fhd':  { w: 1920, h: 2880, label: 'FHD' },
    '2k':   { w: 2560, h: 3840, label: '2K'  },
    '4k':   { w: 3840, h: 5760, label: '4K'  }
  };

  const toolNames = {
    pen:'펜', eraser:'지우개', fill:'색채우기', eyedropper:'스포이드',
    line:'직선', dashed:'점선', rect:'사각형', diamond:'마름모', ellipse:'원', arrow:'화살표', text:'텍스트',
    none:''
  };

  // ── DOM refs ──────────────────────────────────────────────
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');
  const fileInput   = document.getElementById('fileInput');
  const slidebar    = document.getElementById('slidebar');
  const selectionBar= document.getElementById('selectionBar');
  const slideToggle = document.getElementById('slideToggle');
  const colorInput  = document.getElementById('colorInput');
  const sizeInput   = document.getElementById('sizeInput');
  const sizeText    = document.getElementById('sizeText');
  const toastEl     = document.getElementById('toast');
  const tabbar      = document.getElementById('tabbar');
  const tabAddBtn   = document.getElementById('tabAddBtn');

  const tabButtons     = Array.from(document.querySelectorAll('.tab-btn'));
  const panels         = Array.from(document.querySelectorAll('.panel'));
  const toolButtons    = Array.from(document.querySelectorAll('.tool-btn'));
  const selectRectBtn  = document.getElementById('selectRectBtn');
  const selectEllipseBtn = document.getElementById('selectEllipseBtn');

  // ── Global (shared) UI state ──────────────────────────────
  const ui = {
    openPanel: '',
    slideVisible: false,
    tool: 'pen',
    color: '#111111',
    size: 4,
    saveFormat: 'png',
    clipboard: null,   // shared across tabs
    importOrig: false, // 원본 크기로 불러오기
    resCollapsed: false, // 해상도 버튼 접기
  };

  // ── Per-tab state factory ─────────────────────────────────
  let tabIdCounter = 0;
  function nextTabNumber() {
    const used = new Set(tabs.map(t => {
      const m = t.name.match(/^탭 (\d+)$/);
      return m ? parseInt(m[1]) : null;
    }).filter(n => n !== null));
    let n = 1;
    while (used.has(n)) n++;
    return n;
  }

  function makeTab(name) {
    const id = ++tabIdCounter;
    const dc = document.createElement('canvas');
    dc.width = 1600; dc.height = 2400;
    const dctx = dc.getContext('2d', { willReadFrequently: true });
    dctx.fillStyle = '#ffffff';
    dctx.fillRect(0, 0, 1600, 2400);
    return {
      id, name,
      docCanvas: dc,
      docCtx: dctx,
      docW: 1600,
      docH: 2400,
      resolutionKey: 'base',
      history: [],
      selection: null,
      action: null,
      preview: null,
      drawing: false,
      gesture: null,
      textMode: false,
      textObj: null,
      selectionMode: null,
      scale: 1,
      offsetX: 0,
      offsetY: 0,
      minScale: 0.05,
      maxScale: 20,
    };
  }

  let tabs = [ makeTab('탭 1') ];
  let activeTabIdx = 0;

  function tab() { return tabs[activeTabIdx]; }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(text) {
    if (!text) return;
    if (toastTimer) clearTimeout(toastTimer);
    toastEl.textContent = text;
    toastEl.classList.add('show');
    toastEl.classList.toggle('with-slide', ui.slideVisible);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  // ── Persistence ───────────────────────────────────────────
  function saveState() {
    try {
      const tabsData = tabs.map(t => ({
        id: t.id, name: t.name,
        docW: t.docW, docH: t.docH, resolutionKey: t.resolutionKey,
        paintData: t.docCanvas.toDataURL('image/png'),
        scale: t.scale, offsetX: t.offsetX, offsetY: t.offsetY,
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        ui,
        activeTabIdx,
        tabs: tabsData,
      }));
    } catch(e) {}
  }

  let _saveDebounce = null;
  function debouncedSave() {
    if (_saveDebounce) clearTimeout(_saveDebounce);
    _saveDebounce = setTimeout(saveState, 600);
  }

  async function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      // restore ui
      Object.assign(ui, saved.ui || {});
      ui.clipboard = null; // never restore clipboard
      ui.openPanel = '';   // 앱 재시작 시 패널 닫힌 상태로 시작
      activeTabIdx = saved.activeTabIdx || 0;
      // restore tabs
      if (saved.tabs && saved.tabs.length) {
        tabs = [];
        for (const td of saved.tabs) {
          const t = makeTab(td.name || '탭');
          t.id = td.id || t.id;
          const res = RESOLUTIONS[td.resolutionKey];
          if (res) {
            t.resolutionKey = td.resolutionKey;
          } else {
            t.resolutionKey = 'base';
          }
          // docW/docH는 항상 저장된 실제 크기로 복원 (이미지 비율 캔버스 대응)
          if (td.docW && td.docH) {
            t.docW = td.docW; t.docH = td.docH;
            t.docCanvas.width = td.docW; t.docCanvas.height = td.docH;
          } else if (res) {
            t.docW = res.w; t.docH = res.h;
            t.docCanvas.width = res.w; t.docCanvas.height = res.h;
          }
          fillWhiteTab(t);
          if (td.paintData) {
            const img = new Image();
            await new Promise(r => { img.onload = r; img.onerror = r; img.src = td.paintData; });
            if (img.width) { fillWhiteTab(t); t.docCtx.drawImage(img, 0, 0, t.docW, t.docH); }
          }
          t.scale = td.scale || 1;
          t.offsetX = td.offsetX || 0;
          t.offsetY = td.offsetY || 0;
          tabs.push(t);
        }
      }
      if (activeTabIdx >= tabs.length) activeTabIdx = 0;
    } catch(e) { /* ignore */ }
  }

  // ── Tab helpers ───────────────────────────────────────────
  function fillWhiteTab(t) {
    t.docCtx.save();
    t.docCtx.setTransform(1,0,0,1,0,0);
    t.docCtx.fillStyle = '#ffffff';
    t.docCtx.fillRect(0,0,t.docW,t.docH);
    t.docCtx.restore();
  }
  function fillWhite() { fillWhiteTab(tab()); }

  function renderTabbar() {
    // remove existing tab-item elements
    Array.from(tabbar.querySelectorAll('.tab-item')).forEach(el => el.remove());
    tabs.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'tab-item' + (i === activeTabIdx ? ' active' : '');
      el.dataset.idx = i;

      const nameSpan = document.createElement('span');
      nameSpan.className = 'tab-name';
      nameSpan.textContent = t.name;
      el.appendChild(nameSpan);

      if (tabs.length > 1) {
        const closeBtn = document.createElement('button');
        closeBtn.className = 'tab-close';
        closeBtn.type = 'button';
        closeBtn.textContent = '✕';
        closeBtn.dataset.closeIdx = i;
        el.appendChild(closeBtn);
      }
      tabbar.insertBefore(el, tabAddBtn);
    });
    // hide add btn when at max
    tabAddBtn.style.display = tabs.length >= MAX_TABS ? 'none' : '';
  }

  function switchTab(idx) {
    if (idx === activeTabIdx) return;
    commitCurrentTabState();
    activeTabIdx = idx;
    ui.openPanel = '';
    resizeCanvas(); fitView();
    render(); syncUI();
    renderTabbar();
    saveState();
  }

  function addTab() {
    if (tabs.length >= MAX_TABS) { showToast('최대 5개까지 가능합니다'); return; }
    commitCurrentTabState();
    const t = makeTab('탭 ' + nextTabNumber());
    const curResKey = tab().resolutionKey;
    const curRes = RESOLUTIONS[curResKey] || RESOLUTIONS['base'];
    t.docW = curRes.w; t.docH = curRes.h;
    t.resolutionKey = curResKey || 'base';
    t.docCanvas.width = t.docW; t.docCanvas.height = t.docH;
    fillWhiteTab(t);
    tabs.push(t);
    activeTabIdx = tabs.length - 1;
    fitView();
    render(); syncUI();
    renderTabbar();
    saveState();
    showToast(t.name + ' 추가');
  }

  function closeTab(idx) {
    if (tabs.length <= 1) { showToast('마지막 탭은 닫을 수 없습니다'); return; }
    tabs.splice(idx, 1);
    if (activeTabIdx >= tabs.length) activeTabIdx = tabs.length - 1;
    else if (activeTabIdx > idx) activeTabIdx--;
    fitView();
    render(); syncUI();
    renderTabbar();
    saveState();
    showToast('탭 닫기');
  }

  function commitCurrentTabState() {
    const t = tab();
    if (t.textObj) commitTextObjTab(t, true);
    if (t.selection) commitSelectionTab(t, true);
    t.action = null; t.preview = null; t.drawing = false;
  }

  // ── Canvas resize / fit ───────────────────────────────────
  function resizeCanvas() {
    const dpr = Math.max(window.devicePixelRatio || 1, 1);
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.max(1, Math.round(rect.width  * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function fitView() {
    const t = tab();
    const rect = canvas.getBoundingClientRect();
    const w = canvas.clientWidth || rect.width || canvas.offsetWidth;
    if (!w || w < 1) return;
    t.scale   = w / t.docW;
    t.offsetX = 0;
    t.offsetY = 0;
  }

  function screenToWorld(sx, sy) {
    const t = tab();
    return { x: (sx - t.offsetX) / t.scale, y: (sy - t.offsetY) / t.scale };
  }
  function worldToScreen(x, y) {
    const t = tab();
    return { x: x * t.scale + t.offsetX, y: y * t.scale + t.offsetY };
  }

  // ── UI update ─────────────────────────────────────────────
  function updateUI() {
    const t = tab();
    panels.forEach(p => p.classList.toggle('open', p.id === ui.openPanel));
    tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.panel === ui.openPanel));
    toolButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tool === ui.tool));
    selectRectBtn.classList.toggle('active', t.selectionMode === 'rect');
    selectEllipseBtn.classList.toggle('active', t.selectionMode === 'ellipse');
    slidebar.classList.toggle('show', ui.slideVisible);
    slideToggle.classList.toggle('on', ui.slideVisible);
    slideToggle.textContent = ui.slideVisible ? '⌃' : '⌄';
    selectionBar.classList.toggle('with-slide', ui.slideVisible);
    toastEl.classList.toggle('with-slide', ui.slideVisible);
    const textToolBtn = document.getElementById('textToolBtn');
    if (textToolBtn) textToolBtn.classList.toggle('on', t.textMode);
    colorInput.value = ui.color;
    sizeInput.value  = String(ui.size);
    sizeText.textContent = String(ui.size);
    updateResButtons();
    // 원본 불러오기 버튼 동기화
    const importOrigBtn = document.getElementById('importOrigBtn');
    if (importOrigBtn) importOrigBtn.classList.toggle('active', ui.importOrig);
    // 해상도 그룹 접기/펼치기
    const resGroup = document.getElementById('resGroup');
    const resToggleBtn = document.getElementById('resToggleBtn');
    if (resGroup) resGroup.classList.toggle('collapsed', ui.resCollapsed);
    if (resToggleBtn) resToggleBtn.textContent = ui.resCollapsed ? '▶' : '◀';
  }

  function updateResButtons() {
    const t = tab();
    document.querySelectorAll('.res-btn').forEach(btn => {
      const key = btn.dataset.w === '1600' ? 'base' : btn.dataset.w === '1920' ? 'fhd' : btn.dataset.w === '2560' ? '2k' : '4k';
      btn.classList.toggle('active', key === t.resolutionKey);
    });
  }

  function updateSelectionBar() {
    const t = tab();
    const hasSel = !!t.selection;
    if (hasSel) {
      selectionBar.classList.add('show');
    } else {
      selectionBar.classList.remove('show');
    }
    // 복사/잘라내기/삭제: selection 있을 때만 활성
    const dimStyle = 'opacity:.35;pointer-events:none';
    const onStyle  = '';
    const miniCopy   = document.getElementById('miniCopy');
    const miniCut    = document.getElementById('miniCut');
    const miniDelete = document.getElementById('miniDelete');
    if (miniCopy)   miniCopy.style.cssText   = hasSel ? onStyle : dimStyle;
    if (miniCut)    miniCut.style.cssText     = hasSel ? onStyle : dimStyle;
    if (miniDelete) miniDelete.style.cssText  = hasSel ? onStyle : dimStyle;
    // 편집패널 붙여넣기 버튼: 클립보드 있으면 흰색, 없으면 회색
    const pasteBtn = document.getElementById('pasteBtn');
    if (pasteBtn) pasteBtn.style.color = ui.clipboard ? '' : '#555e6e';
  }

  // ── Render ────────────────────────────────────────────────
  // 캔버스 그리기만. DOM 조작은 syncUI()에서 처리
  function render() {
    const t = tab();
    const dpr = Math.max(window.devicePixelRatio || 1, 1);
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#11161d';
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,.25)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 3;
    ctx.drawImage(t.docCanvas, t.offsetX, t.offsetY, t.docW * t.scale, t.docH * t.scale);
    ctx.restore();

    if (t.preview)   drawPreview();
    if (t.selection) drawSelection();
    if (t.textObj)   drawTextObj();
  }

  function syncUI() {
    updateUI();
    updateSelectionBar();
  }

  // ── Shape drawing ─────────────────────────────────────────
  function dashedInterval() {
    const gap   = Math.max(ui.size * 2, 20);
    const space = Math.max(ui.size * 1.5, 14);
    return [gap, space];
  }

  function drawShapePath(target, tool, a, b) {
    target.beginPath();
    if (tool === 'line' || tool === 'dashed') {
      target.moveTo(a.x, a.y); target.lineTo(b.x, b.y);
    } else if (tool === 'rect') {
      target.rect(Math.min(a.x,b.x), Math.min(a.y,b.y), Math.abs(b.x-a.x), Math.abs(b.y-a.y));
    } else if (tool === 'diamond') {
      const x1=Math.min(a.x,b.x), y1=Math.min(a.y,b.y), x2=Math.max(a.x,b.x), y2=Math.max(a.y,b.y);
      const cx=(x1+x2)/2, cy=(y1+y2)/2;
      target.moveTo(cx,y1); target.lineTo(x2,cy); target.lineTo(cx,y2); target.lineTo(x1,cy); target.closePath();
    } else if (tool === 'ellipse') {
      const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2, rx=Math.abs(b.x-a.x)/2, ry=Math.abs(b.y-a.y)/2;
      target.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    } else if (tool === 'arrow') {
      const ang = Math.atan2(b.y-a.y, b.x-a.x);
      const head = Math.max(16, ui.size*3);
      target.moveTo(a.x,a.y); target.lineTo(b.x,b.y);
      target.lineTo(b.x - head*Math.cos(ang-Math.PI/6), b.y - head*Math.sin(ang-Math.PI/6));
      target.moveTo(b.x,b.y);
      target.lineTo(b.x - head*Math.cos(ang+Math.PI/6), b.y - head*Math.sin(ang+Math.PI/6));
    }
  }

  function drawPreview() {
    const t = tab();
    const p = t.preview;
    ctx.save();
    ctx.translate(t.offsetX, t.offsetY);
    ctx.scale(t.scale, t.scale);

    if (p.tool === 'rect' || p.tool === 'ellipse') {
      if (t.action && t.action.type === 'selectionPreview') {
        ctx.strokeStyle = '#6aa7ff';
        ctx.lineWidth   = 1.5 / t.scale;
        ctx.setLineDash([8/t.scale, 6/t.scale]);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        drawShapePath(ctx, p.tool, p.a, p.b);
        ctx.stroke(); ctx.setLineDash([]); ctx.restore(); return;
      }
    }
    ctx.strokeStyle = p.tool === 'eraser' ? '#ffffff' : ui.color;
    ctx.lineWidth   = ui.size;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (p.dashed) { const d=dashedInterval(); ctx.setLineDash([d[0]/t.scale, d[1]/t.scale]); }
    drawShapePath(ctx, p.tool, p.a, p.b);
    ctx.stroke(); ctx.setLineDash([]); ctx.restore();
  }

  function drawSelection() {
    const t = tab();
    const s = t.selection;
    const a = worldToScreen(s.x, s.y);
    const b = worldToScreen(s.x+s.w, s.y+s.h);
    const x=a.x, y=a.y, w=b.x-a.x, h=b.y-a.y;

    ctx.save();
    const cx=x+w/2, cy=y+h/2;
    ctx.translate(cx,cy);
    ctx.rotate((s.rotation||0)*Math.PI/180);
    ctx.drawImage(s.canvas, -w/2,-h/2, w,h);
    ctx.strokeStyle='#6aa7ff'; ctx.lineWidth=1.5; ctx.setLineDash([8,6]);
    if (s.shape==='ellipse') {
      ctx.beginPath(); ctx.ellipse(0,0,Math.abs(w)/2,Math.abs(h)/2,0,0,Math.PI*2); ctx.stroke();
    } else { ctx.strokeRect(-w/2,-h/2,w,h); }
    ctx.setLineDash([]); ctx.lineWidth=1;
    const hs=10;
    [[-w/2,-h/2],[0,-h/2],[w/2,-h/2],[w/2,0],[w/2,h/2],[0,h/2],[-w/2,h/2],[-w/2,0]].forEach(([hx,hy])=>{
      ctx.fillStyle='#ffffff'; ctx.strokeStyle='#6aa7ff';
      ctx.fillRect(hx-hs/2,hy-hs/2,hs,hs); ctx.strokeRect(hx-hs/2,hy-hs/2,hs,hs);
    });
    ctx.beginPath(); ctx.moveTo(0,-h/2); ctx.lineTo(0,-h/2-22);
    ctx.lineWidth=1.5; ctx.strokeStyle='#6aa7ff'; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,-h/2-32,7,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.fill(); ctx.strokeStyle='#6aa7ff'; ctx.stroke();
    ctx.restore();
    // selectionBar 표시는 updateSelectionBar()에서 일원화 처리
  }

  function drawTextObj() {
    const t = tab();
    const to = t.textObj;
    const a = worldToScreen(to.x, to.y);
    const b = worldToScreen(to.x+to.w, to.y+to.h);
    const x=a.x, y=a.y, w=b.x-a.x, h=b.y-a.y;
    ctx.save();
    ctx.drawImage(to.canvas, x,y,w,h);
    ctx.strokeStyle='#6aa7ff'; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    ctx.strokeRect(x,y,w,h); ctx.setLineDash([]);
    ctx.fillStyle='#ffffff'; ctx.strokeStyle='#6aa7ff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x+w/2, y-10, 7,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillRect(x+w-8, y+h-8, 16,16); ctx.strokeRect(x+w-8, y+h-8, 16,16);
    ctx.restore();
  }

  // ── History ───────────────────────────────────────────────
  function pushHistory() {
    const t = tab();
    if (t.history.length >= HISTORY_LIMIT) t.history.shift();
    // 크기 정보도 함께 저장 (이미지 불러오기 후 undo 시 크기 복원용)
    t.history.push({ dataURL: t.docCanvas.toDataURL('image/png'), docW: t.docW, docH: t.docH });
  }

  let _undoToken = 0;
  function restoreFromDataURL(entry) {
    const t = tab(); // undo 시점의 탭을 클로저로 고정
    const token = ++_undoToken;
    const dataURL = typeof entry === 'string' ? entry : entry.dataURL;
    const snapW = (typeof entry === 'object' && entry.docW) ? entry.docW : t.docW;
    const snapH = (typeof entry === 'object' && entry.docH) ? entry.docH : t.docH;
    const img = new Image();
    img.onload = () => {
      // 이후 undo가 호출됐으면 이 결과는 무시
      if (token !== _undoToken) return;
      // 스냅샷 시점의 캔버스 크기로 복원
      t.docW = snapW; t.docH = snapH;
      t.docCanvas.width = snapW; t.docCanvas.height = snapH;
      fillWhiteTab(t);
      t.docCtx.drawImage(img, 0, 0, snapW, snapH);
      t.selection=null; t.action=null;
      // 완료 시점에 t가 여전히 활성 탭이면 render, 아니면 docCanvas만 업데이트
      if (tab() === t) { fitView(); render(); syncUI(); }
      saveState();
    };
    img.src = dataURL;
  }

  function undo() {
    const t = tab();
    if (t.selection) { t.selection=null; t.action=null; }
    const prev = t.history.pop();
    if (!prev) { render(); syncUI(); return; }
    restoreFromDataURL(prev);
  }

  // ── Selection ─────────────────────────────────────────────
  function clearAreaWhite(x, y, w, h) {
    const t = tab();
    t.docCtx.save();
    t.docCtx.globalCompositeOperation = 'source-over';
    t.docCtx.fillStyle = '#ffffff';
    t.docCtx.fillRect(x, y, w, h);
    t.docCtx.restore();
  }

  function clearSelection(renderNow=true) {
    const t = tab();
    t.selection=null; t.action=null;
    if (renderNow) { render(); syncUI(); }
  }

  function commitSelectionTab(t, silent=false) {
    if (!t.selection) return;
    const s = t.selection;
    // push to that tab's history
    if (t.history.length >= HISTORY_LIMIT) t.history.shift();
    t.history.push({ dataURL: t.docCanvas.toDataURL('image/png'), docW: t.docW, docH: t.docH });
    t.docCtx.save();
    t.docCtx.translate(s.x+s.w/2, s.y+s.h/2);
    t.docCtx.rotate((s.rotation||0)*Math.PI/180);
    t.docCtx.drawImage(s.canvas, -s.w/2,-s.h/2, s.w,s.h);
    t.docCtx.restore();
    t.selection=null; t.action=null;
    if (!silent) { render(); syncUI(); debouncedSave(); showToast('적용'); }
  }

  function commitSelection(silent=false) { commitSelectionTab(tab(), silent); }

  function buildSelection(shape, a, b) {
    const t = tab();
    const x=Math.min(a.x,b.x), y=Math.min(a.y,b.y), w=Math.abs(b.x-a.x), h=Math.abs(b.y-a.y);
    if (w<8||h<8) return;
    const c = document.createElement('canvas');
    c.width=Math.max(1,Math.round(w)); c.height=Math.max(1,Math.round(h));
    c.getContext('2d').drawImage(t.docCanvas, x,y,w,h, 0,0,c.width,c.height);

    let out = c;
    if (shape==='ellipse') {
      const masked=document.createElement('canvas');
      masked.width=c.width; masked.height=c.height;
      const mctx=masked.getContext('2d');
      mctx.save(); mctx.beginPath();
      mctx.ellipse(masked.width/2,masked.height/2,masked.width/2,masked.height/2,0,0,Math.PI*2);
      mctx.clip(); mctx.drawImage(c,0,0); mctx.restore();
      out=masked;
      pushHistory();
      t.docCtx.save(); t.docCtx.beginPath();
      t.docCtx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);
      t.docCtx.clip(); clearAreaWhite(x,y,w,h); t.docCtx.restore();
    } else { pushHistory(); clearAreaWhite(x,y,w,h); }

    t.selection={ shape,x,y,w,h,rotation:0,canvas:out };
    render(); syncUI(); debouncedSave();
  }

  function copySelection() {
    const t = tab();
    if (!t.selection) return;
    const c=document.createElement('canvas');
    c.width=t.selection.canvas.width; c.height=t.selection.canvas.height;
    c.getContext('2d').drawImage(t.selection.canvas,0,0);
    ui.clipboard={ shape:t.selection.shape, w:t.selection.w, h:t.selection.h, canvas:c };
    render(); syncUI(); debouncedSave(); showToast('복사');
  }

  function cutSelection() {
    const t = tab();
    if (!t.selection) return;
    copySelection();
    t.selection=null; t.action=null;
    render(); syncUI(); debouncedSave(); showToast('잘라내기');
  }

  function pasteClipboard() {
    if (!ui.clipboard) return;
    const t = tab();
    if (t.selection) commitSelectionTab(t, true);
    const c=document.createElement('canvas');
    c.width=ui.clipboard.canvas.width; c.height=ui.clipboard.canvas.height;
    c.getContext('2d').drawImage(ui.clipboard.canvas,0,0);
    const rect=canvas.getBoundingClientRect();
    const cx=screenToWorld(rect.width/2, rect.height/2);
    t.selection={ shape:ui.clipboard.shape, x:cx.x-ui.clipboard.w/2, y:cx.y-ui.clipboard.h/2,
                  w:ui.clipboard.w, h:ui.clipboard.h, rotation:0, canvas:c };
    render(); syncUI(); debouncedSave(); showToast('붙여넣기');
  }

  function deleteSelection() {
    const t = tab();
    if (!t.selection) return;
    t.selection=null; t.action=null;
    render(); syncUI(); debouncedSave(); showToast('삭제');
  }

  // ── Hit testing ───────────────────────────────────────────
  function rotatePoint(px,py,cx,cy,deg) {
    const rad=deg*Math.PI/180, dx=px-cx, dy=py-cy;
    return { x:dx*Math.cos(rad)-dy*Math.sin(rad)+cx, y:dx*Math.sin(rad)+dy*Math.cos(rad)+cy };
  }

  function hitSelection(pt) {
    const t = tab();
    if (!t.selection) return null;
    const s=t.selection;
    const cx=s.x+s.w/2, cy=s.y+s.h/2;
    const unrot=rotatePoint(pt.x,pt.y,cx,cy,-(s.rotation||0));
    const hs=16/t.scale;
    const handles=[
      {name:'nw',x:s.x,y:s.y},{name:'n',x:s.x+s.w/2,y:s.y},{name:'ne',x:s.x+s.w,y:s.y},
      {name:'e',x:s.x+s.w,y:s.y+s.h/2},{name:'se',x:s.x+s.w,y:s.y+s.h},
      {name:'s',x:s.x+s.w/2,y:s.y+s.h},{name:'sw',x:s.x,y:s.y+s.h},{name:'w',x:s.x,y:s.y+s.h/2}
    ];
    for (const h of handles) {
      if (Math.abs(unrot.x-h.x)<=hs && Math.abs(unrot.y-h.y)<=hs) return {type:'resize',handle:h.name};
    }
    const rotHandle={x:s.x+s.w/2, y:s.y-(32/t.scale)};
    if (Math.hypot(unrot.x-rotHandle.x,unrot.y-rotHandle.y)<=18/t.scale) return {type:'rotate'};
    if (unrot.x>=s.x&&unrot.x<=s.x+s.w&&unrot.y>=s.y&&unrot.y<=s.y+s.h) return {type:'move',point:unrot};
    return null;
  }

  function resizeSelection(pt) {
    const t = tab();
    const s=t.selection, a=t.action;
    let x=s.x,y=s.y,w=s.w,h=s.h;
    if (a.handle.includes('n')) { h=(a.startY+a.startH)-pt.y; y=pt.y; }
    if (a.handle.includes('w')) { w=(a.startX+a.startW)-pt.x; x=pt.x; }
    if (a.handle.includes('s')) { h=pt.y-a.startY; y=a.startY; }
    if (a.handle.includes('e')) { w=pt.x-a.startX; x=a.startX; }
    if (w<8||h<8) return;
    s.x=x; s.y=y; s.w=w; s.h=h; render();
  }

  function hitTextObj(pt) {
    const t = tab();
    if (!t.textObj) return null;
    const to=t.textObj;
    const hs=16/t.scale;
    if (Math.abs(pt.x-(to.x+to.w))<=hs && Math.abs(pt.y-(to.y+to.h))<=hs) return 'resize';
    if (Math.hypot(pt.x-(to.x+to.w/2), pt.y-(to.y-(10/t.scale)))<=hs) return 'move';
    if (pt.x>=to.x&&pt.x<=to.x+to.w&&pt.y>=to.y&&pt.y<=to.y+to.h) return 'move';
    return null;
  }

  // ── Stroke ────────────────────────────────────────────────
  function startStroke(pt) {
    const t = tab();
    pushHistory();
    t.docCtx.save();
    t.docCtx.lineCap='round'; t.docCtx.lineJoin='round';
    t.docCtx.strokeStyle = ui.tool==='eraser' ? '#ffffff' : ui.color;
    t.docCtx.lineWidth = ui.size;
    t.docCtx.beginPath(); t.docCtx.moveTo(pt.x,pt.y);
  }
  function moveStroke(pt) {
    const t = tab();
    t.docCtx.lineTo(pt.x,pt.y); t.docCtx.stroke();
    t.docCtx.beginPath(); t.docCtx.moveTo(pt.x,pt.y);
  }
  function endStroke() { tab().docCtx.restore(); debouncedSave(); }

  function drawFinalShape(tool, a, b) {
    const t = tab();
    pushHistory();
    t.docCtx.save();
    t.docCtx.setTransform(1,0,0,1,0,0);
    t.docCtx.strokeStyle=ui.color; t.docCtx.lineWidth=ui.size;
    t.docCtx.lineCap='round'; t.docCtx.lineJoin='round';
    const dash=(tool==='dashed')?dashedInterval():[];
    t.docCtx.setLineDash(dash);
    let aa=a, bb=b;
    if (tool==='line'||tool==='dashed'||tool==='arrow') {
      const dx=b.x-a.x, dy=b.y-a.y;
      if (Math.abs(dx)>Math.abs(dy)*2) bb={x:b.x,y:a.y};
      else if (Math.abs(dy)>Math.abs(dx)*2) bb={x:a.x,y:b.y};
    }
    if (tool==='ellipse'||tool==='rect') {
      const dx=b.x-a.x, dy=b.y-a.y;
      const ratio=Math.abs(Math.abs(dx)-Math.abs(dy))/Math.max(1,Math.max(Math.abs(dx),Math.abs(dy)));
      if (ratio<0.18) { const side=Math.max(Math.abs(dx),Math.abs(dy)); bb={x:a.x+Math.sign(dx||1)*side,y:a.y+Math.sign(dy||1)*side}; }
    }
    drawShapePath(t.docCtx, tool, aa, bb);
    t.docCtx.stroke(); t.docCtx.setLineDash([]); t.docCtx.restore();
    render(); syncUI(); debouncedSave(); showToast(toolNames[tool]||tool);
  }

  // ── Fill / eyedropper ─────────────────────────────────────
  function fillAt(pt) {
    const t = tab();
    const sx=Math.max(0,Math.min(t.docW-1,Math.round(pt.x)));
    const sy=Math.max(0,Math.min(t.docH-1,Math.round(pt.y)));
    const img=t.docCtx.getImageData(0,0,t.docW,t.docH);
    const data=img.data;
    const idx=(sy*t.docW+sx)*4;
    const tr=data[idx],tg=data[idx+1],tb=data[idx+2],ta=data[idx+3];
    const hex=ui.color.replace('#','');
    const fr=parseInt(hex.slice(0,2),16),fg=parseInt(hex.slice(2,4),16),fb=parseInt(hex.slice(4,6),16);
    if (tr===fr&&tg===fg&&tb===fb&&ta===255) return;
    pushHistory();
    function match(i){return data[i]===tr&&data[i+1]===tg&&data[i+2]===tb&&data[i+3]===ta;}
    function paint(i){data[i]=fr;data[i+1]=fg;data[i+2]=fb;data[i+3]=255;}
    const queue=[[sy,sx,sx]];
    const visited=new Uint8Array(t.docW*t.docH);
    visited[sy*t.docW+sx]=1;
    while(queue.length){
      const [row,x1,x2]=queue.pop();
      let left=x1; while(left>0&&match((row*t.docW+left-1)*4))left--;
      let right=x2; while(right<t.docW-1&&match((row*t.docW+right+1)*4))right++;
      for(let col=left;col<=right;col++){paint((row*t.docW+col)*4);visited[row*t.docW+col]=1;}
      for(const nextRow of[row-1,row+1]){
        if(nextRow<0||nextRow>=t.docH)continue;
        let inSpan=false;
        for(let col=left;col<=right;col++){
          const vi=nextRow*t.docW+col;
          if(!visited[vi]&&match(vi*4)){if(!inSpan){queue.push([nextRow,col,col]);inSpan=true;visited[vi]=1;}}
          else{inSpan=false;}
        }
      }
    }
    t.docCtx.putImageData(img,0,0);
    render(); syncUI(); debouncedSave(); showToast('색채우기');
  }

  function eyedropAt(pt) {
    const t = tab();
    const x=Math.max(0,Math.min(t.docW-1,Math.round(pt.x)));
    const y=Math.max(0,Math.min(t.docH-1,Math.round(pt.y)));
    const d=t.docCtx.getImageData(x,y,1,1).data;
    ui.color='#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    render(); syncUI(); debouncedSave(); showToast('스포이드');
  }

  // ── Text ──────────────────────────────────────────────────
  function renderTextObj(to) {
    const c=document.createElement('canvas');
    const tmpCtx=document.createElement('canvas').getContext('2d');
    tmpCtx.font=to.fontSize+'px system-ui, sans-serif';
    const lines=to.text.split('\n');
    const lineH=to.fontSize*1.3;
    const maxW=Math.max(...lines.map(l=>tmpCtx.measureText(l).width));
    c.width=Math.max(1,Math.ceil(maxW))+8;
    c.height=Math.max(1,Math.ceil(lines.length*lineH))+8;
    const cctx=c.getContext('2d');
    cctx.font=to.fontSize+'px system-ui, sans-serif';
    cctx.fillStyle=to.color; cctx.textBaseline='top';
    lines.forEach((line,i)=>cctx.fillText(line,4,4+i*lineH));
    return {canvas:c, w:c.width, h:c.height};
  }

  function startTextMode() {
    const t = tab();
    if (t.textObj) commitTextObjTab(t,true);
    if (t.selection) commitSelectionTab(t,true);
    t.textMode=!t.textMode;
    if (!t.textMode) t.textObj=null;
    render(); syncUI();
    showToast(t.textMode?'텍스트: 캔버스를 탭하세요':'텍스트 모드 해제');
  }

  function placeText(pt) {
    const t = tab();
    showTextOverlay(pt);
  }

  function commitTextObjTab(t, silent=false) {
    if (!t.textObj) return;
    if (t.history.length>=HISTORY_LIMIT) t.history.shift();
    t.history.push({ dataURL: t.docCanvas.toDataURL('image/png'), docW: t.docW, docH: t.docH });
    t.docCtx.drawImage(t.textObj.canvas, t.textObj.x, t.textObj.y);
    t.textObj=null; t.action=null;
    if (!silent) { render(); syncUI(); debouncedSave(); showToast('텍스트 적용'); }
  }
  function commitTextObj(silent=false) { commitTextObjTab(tab(),silent); }

  // ── Resolution ────────────────────────────────────────────
  function applyResolution(key, withConfirm=true) {
    const t = tab();
    const res=RESOLUTIONS[key];
    if (!res) return;
    function doApply() {
      t.resolutionKey=key; t.docW=res.w; t.docH=res.h;
      t.docCanvas.width=t.docW; t.docCanvas.height=t.docH;
      fillWhiteTab(t);
      t.history=[]; t.selection=null; t.action=null; t.preview=null; t.textObj=null;
      resizeCanvas(); fitView(); render(); syncUI(); debouncedSave();
      showToast('해상도: '+res.label+' ('+res.w+'×'+res.h+')');
    }
    if (withConfirm) {
      showConfirmOverlay('해상도 변경', '현재 탭의 그림이 지워집니다. 계속할까요?', doApply);
    } else {
      doApply();
    }
  }

  // ── Tool / panel controls ─────────────────────────────────
  function setTool(tool) {
    const t=tab();
    if (t.textObj) commitTextObj(true);
    t.textMode=false;
    if (t.selection) commitSelection(true);
    t.selectionMode=null;
    ui.tool=tool;
    debouncedSave(); render(); syncUI(); showToast(toolNames[tool]||tool);
  }

  function selectAll() {
    const t = tab();
    if (t.selection) commitSelectionTab(t, true);
    if (t.textObj) commitTextObjTab(t, true);
    t.textMode = false;
    // 전체 캔버스를 선택 영역으로
    const c = document.createElement('canvas');
    c.width = t.docW; c.height = t.docH;
    c.getContext('2d').drawImage(t.docCanvas, 0, 0);
    fillWhiteTab(t);
    t.selection = { shape: 'rect', x: 0, y: 0, w: t.docW, h: t.docH, rotation: 0, canvas: c };
    render(); syncUI(); debouncedSave(); showToast('모두 선택');
  }

  function toggleSelectionMode(mode) {
    const t=tab();
    if (t.selection) commitSelection(true);
    t.selectionMode=t.selectionMode===mode?null:mode;
    debouncedSave(); render(); syncUI();
    showToast(t.selectionMode==='rect'?'사각선택 모드':t.selectionMode==='ellipse'?'원선택 모드':'선택 해제');
  }

  function openPanel(id) {
    const t=tab();
    const isOpening=ui.openPanel!==id;
    if (isOpening&&t.textObj) commitTextObj(true);
    if (isOpening) t.textMode=false;
    if (isOpening&&id!=='editPanel'&&t.selection) commitSelection(true);
    if (isOpening&&id!=='editPanel') t.selectionMode=null;
    // 패널 열릴 때 slidebar 자동 닫기
    if (isOpening && ui.slideVisible) {
      ui.slideVisible = false;
    }
    ui.openPanel=isOpening?id:'';
    debouncedSave(); render(); syncUI();
    if (isOpening) showToast(id==='filePanel'?'파일':id==='editPanel'?'편집':'도구');
    setTimeout(function(){resizeCanvas();render();},50);
  }

  function toggleSlide() {
    ui.slideVisible=!ui.slideVisible;
    debouncedSave(); render(); syncUI();
    showToast(ui.slideVisible?'옵션 열기':'옵션 닫기');
    setTimeout(function(){resizeCanvas();render();},200);
  }

  // ── File I/O ──────────────────────────────────────────────
  function saveFile() {
    const t=tab();
    const defaultName = 'drawing.' + (ui.saveFormat || 'png');
    showSaveOverlay(defaultName, function(input) {
      if (!input) return;
      const lower=input.toLowerCase();
      const isJpg=lower.endsWith('.jpg')||lower.endsWith('.jpeg');
      const base=input.replace(/\.[^.]+$/,'') || 'drawing';
      const fmt=isJpg?'jpg':'png';
      const out=document.createElement('canvas');
      out.width=t.docW; out.height=t.docH;
      const octx=out.getContext('2d');
      octx.fillStyle='#ffffff'; octx.fillRect(0,0,t.docW,t.docH);
      octx.drawImage(t.docCanvas,0,0);
      const a=document.createElement('a');
      a.href=out.toDataURL(isJpg?'image/jpeg':'image/png',isJpg?0.92:undefined);
      a.download=base+'.'+fmt; a.click();
      ui.saveFormat=fmt; saveState(); showToast('저장 완료');
    });
  }

  function importImage(file) {
    if (!file) return;
    const origMode = ui.importOrig;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      // 현재 탭에 그림이 있으면 새 탭 추가, 없으면 현재 탭에 불러오기
      const cur = tab();
      const isEmpty = (function(){
        const d = cur.docCtx.getImageData(0,0,cur.docW,cur.docH).data;
        for (let i=0;i<d.length;i+=4) if(d[i]<250||d[i+1]<250||d[i+2]<250) return false;
        return true;
      })();
      if (!isEmpty && tabs.length < MAX_TABS) {
        commitCurrentTabState();
        const nt = makeTab('탭 ' + nextTabNumber());
        const curRes = RESOLUTIONS[cur.resolutionKey] || RESOLUTIONS['base'];
        nt.docW = curRes.w; nt.docH = curRes.h;
        nt.resolutionKey = cur.resolutionKey;
        nt.docCanvas.width = nt.docW; nt.docCanvas.height = nt.docH;
        fillWhiteTab(nt);
        tabs.push(nt);
        activeTabIdx = tabs.length - 1;
        renderTabbar();
      }
      const t = tab(); // 새 탭 or 현재 탭
      // 새 탭으로 전환됐으면 캔버스 크기 재계산
      resizeCanvas();

      if (t.history.length >= HISTORY_LIMIT) t.history.shift();
      t.history.push({ dataURL: t.docCanvas.toDataURL('image/png'), docW: t.docW, docH: t.docH });
      t.selection = null; t.action = null; t.preview = null;
      t.textObj = null; t.textMode = false;

      if (origMode) {
        // 원본 ON: 이미지 원본 픽셀 크기로 캔버스 맞춤
        const newW = Math.max(img.width, 100);
        const newH = Math.max(img.height, 100);
        t.docW = newW; t.docH = newH;
        t.docCanvas.width = newW; t.docCanvas.height = newH;
        fillWhiteTab(t);
        t.docCtx.drawImage(img, 0, 0, newW, newH);
      } else {
        // 원본 OFF: 해상도 캔버스 고정, 이미지는 비율 유지해서 안에 맞춤 (나머지 흰 여백)
        const curRes = RESOLUTIONS[t.resolutionKey] || RESOLUTIONS['base'];
        const canW = curRes.w, canH = curRes.h;
        t.docW = canW; t.docH = canH;
        t.docCanvas.width = canW; t.docCanvas.height = canH;
        fillWhiteTab(t);
        // 이미지를 캔버스 안에 비율 유지하며 최대 크기로 배치 (좌상단 기준)
        const scale = Math.min(canW / img.width, canH / img.height);
        const drawW = Math.round(img.width * scale);
        const drawH = Math.round(img.height * scale);
        t.docCtx.drawImage(img, 0, 0, drawW, drawH);
      }
      URL.revokeObjectURL(url);
      ui.tool = 'none';
      if (tab() === t) { fitView(); render(); syncUI(); }
      saveState(); showToast(origMode ? '원본 크기로 불러오기' : '불러오기');
    };
    img.src = url;
  }

  // ── Overlay modals ────────────────────────────────────────
  let _textOverlayCallback = null;
  let _saveOverlayCallback = null;

  function showTextOverlay(pt) {
    const overlay = document.getElementById('textOverlay');
    const input   = document.getElementById('textOverlayInput');
    if (overlay.classList.contains('show')) return; // 중복 방지
    input.value = '';
    overlay.classList.add('show');
    setTimeout(() => input.focus(), 120);

    _textOverlayCallback = function(text) {
      overlay.classList.remove('show');
      if (!text || !text.trim()) return;
      const t = tab();
      const fontSize = Math.max(20, ui.size * 8);
      const to = { text: text.trim(), x: pt.x, y: pt.y, fontSize, color: ui.color };
      const rendered = renderTextObj(to);
      t.textObj = { ...to, canvas: rendered.canvas, w: rendered.w, h: rendered.h };
      render(); syncUI();
    };
  }

  function showSaveOverlay(defaultName, callback) {
    const overlay = document.getElementById('saveOverlay');
    const input   = document.getElementById('saveOverlayInput');
    if (overlay.classList.contains('show')) return; // 중복 방지
    input.value = defaultName;
    overlay.classList.add('show');
    setTimeout(() => { input.focus(); input.select(); }, 120);
    _saveOverlayCallback = function(name) {
      overlay.classList.remove('show');
      callback(name ? name.trim() : null);
    };
  }

  function bindOverlayEvents() {
    // 텍스트 오버레이
    const textOverlay  = document.getElementById('textOverlay');
    const textInput    = document.getElementById('textOverlayInput');
    const textConfirm  = document.getElementById('textOverlayConfirm');
    const textCancel   = document.getElementById('textOverlayCancel');

    function doTextConfirm() {
      if (_textOverlayCallback) { _textOverlayCallback(textInput.value); _textOverlayCallback = null; }
    }
    function doTextCancel() {
      textOverlay.classList.remove('show');
      _textOverlayCallback = null;
      // 텍스트 모드도 함께 해제
      const t = tab();
      t.textMode = false;
      render(); syncUI();
    }
    bindDirectTap(textConfirm, doTextConfirm);
    bindDirectTap(textCancel,  doTextCancel);
    textInput.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { e.preventDefault(); doTextCancel(); }
    });
    // 배경 탭으로 닫기
    textOverlay.addEventListener('touchend', function(e) {
      if (e.target === textOverlay) { e.preventDefault(); doTextCancel(); }
    }, { passive: false });
    textOverlay.addEventListener('click', function(e) {
      if (e.target === textOverlay) doTextCancel();
    });

    // 저장 오버레이
    const saveOverlay  = document.getElementById('saveOverlay');
    const saveInput    = document.getElementById('saveOverlayInput');
    const saveConfirm  = document.getElementById('saveOverlayConfirm');
    const saveCancel   = document.getElementById('saveOverlayCancel');

    function doSaveConfirm() {
      if (_saveOverlayCallback) { _saveOverlayCallback(saveInput.value); _saveOverlayCallback = null; }
    }
    function doSaveCancel() {
      saveOverlay.classList.remove('show');
      _saveOverlayCallback = null;
    }
    bindDirectTap(saveConfirm, doSaveConfirm);
    bindDirectTap(saveCancel,  doSaveCancel);
    saveInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); doSaveConfirm(); }
      if (e.key === 'Escape') { e.preventDefault(); doSaveCancel(); }
    });
    saveOverlay.addEventListener('touchend', function(e) {
      if (e.target === saveOverlay) { e.preventDefault(); doSaveCancel(); }
    }, { passive: false });
    saveOverlay.addEventListener('click', function(e) {
      if (e.target === saveOverlay) doSaveCancel();
    });

    // 범용 확인 오버레이
    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmOk     = document.getElementById('confirmOverlayOk');
    const confirmCancel = document.getElementById('confirmOverlayCancel');
    function doConfirmCancel() {
      confirmOverlay.classList.remove('show');
      _confirmOverlayCallback = null;
    }
    bindDirectTap(confirmOk, function() {
      confirmOverlay.classList.remove('show');
      if (_confirmOverlayCallback) { const cb = _confirmOverlayCallback; _confirmOverlayCallback = null; cb(); }
    });
    bindDirectTap(confirmCancel, doConfirmCancel);
    confirmOverlay.addEventListener('touchend', function(e) {
      if (e.target === confirmOverlay) { e.preventDefault(); doConfirmCancel(); }
    }, { passive: false });
    confirmOverlay.addEventListener('click', function(e) {
      if (e.target === confirmOverlay) doConfirmCancel();
    });
  }

  let _confirmOverlayCallback = null;
  function showConfirmOverlay(title, msg, onOk) {
    const overlay = document.getElementById('confirmOverlay');
    document.getElementById('confirmOverlayTitle').textContent = title;
    document.getElementById('confirmOverlayMsg').textContent = msg;
    _confirmOverlayCallback = onOk;
    overlay.classList.add('show');
  }

  // ── Event helpers ─────────────────────────────────────────
  function getPointFromEvent(e) {
    const p=(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]
           :(e.touches&&e.touches.length>0)?e.touches[0]:e;
    const rect=canvas.getBoundingClientRect();
    const sx=p.clientX-rect.left, sy=p.clientY-rect.top;
    const world=screenToWorld(sx,sy);
    return {sx,sy,x:world.x,y:world.y};
  }

  // ── Canvas event handlers ─────────────────────────────────
  function onCanvasDown(e) {
    e.preventDefault();
    const t=tab();

    if (e.touches&&e.touches.length>=2) {
      if (e.touches.length>2) return;
      if (t.drawing){t.drawing=false;endStroke();}
      t.action=null; t.preview=null;
      const rect=canvas.getBoundingClientRect();
      const t1=e.touches[0],t2=e.touches[1];
      const startDist=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
      if (startDist<1) return;
      t.gesture={
        startDist,startScale:t.scale,
        startMidX:((t1.clientX+t2.clientX)/2)-rect.left,
        startMidY:((t1.clientY+t2.clientY)/2)-rect.top,
        baseOffsetX:t.offsetX,baseOffsetY:t.offsetY
      };
      return;
    }

    const pt=getPointFromEvent(e);

    if (t.textObj) {
      const hit=hitTextObj(pt);
      if (hit==='resize') {
        t.action={type:'resizeText',startFontSize:t.textObj.fontSize,startX:pt.x,startY:pt.y,origW:t.textObj.w,origH:t.textObj.h};
        return;
      }
      if (hit==='move') { t.action={type:'moveText',dx:pt.x-t.textObj.x,dy:pt.y-t.textObj.y}; return; }
      commitTextObj();
    }

    if (t.selection) {
      const hit=hitSelection(pt);
      if (hit) {
        const s=t.selection;
        const cx=s.x+s.w/2, cy=s.y+s.h/2;
        if (hit.type==='move')   { t.action={type:'moveSelection',dx:pt.x-s.x,dy:pt.y-s.y}; return; }
        if (hit.type==='resize') { t.action={type:'resizeSelection',handle:hit.handle,startX:s.x,startY:s.y,startW:s.w,startH:s.h}; return; }
        if (hit.type==='rotate') { t.action={type:'rotateSelection',cx,cy}; return; }
      } else { commitSelection(true); }
    }

    if (t.selectionMode) {
      t.action={type:'selectionPreview',shape:t.selectionMode};
      t.preview={tool:t.selectionMode==='ellipse'?'ellipse':'rect',a:pt,b:pt};
      render(); return;
    }
    if (t.textMode) { placeText(pt); return; }

    if (ui.tool==='pen'||ui.tool==='eraser') {
      t.drawing=true; startStroke(pt); moveStroke(pt); render(); return;
    }
    if (['line','dashed','rect','diamond','ellipse','arrow'].includes(ui.tool)) {
      t.action={type:'shapePreview'};
      t.preview={tool:ui.tool,a:pt,b:pt,dashed:ui.tool==='dashed'};
      render(); return;
    }
    if (ui.tool==='fill') { fillAt(pt); return; }
    if (ui.tool==='eyedropper') { eyedropAt(pt); return; }
    if (ui.tool==='none') { return; }
  }

  function onCanvasMove(e) {
    e.preventDefault();
    const t=tab();

    if (t.gesture&&e.touches&&e.touches.length===2) {
      const rect=canvas.getBoundingClientRect();
      const t1=e.touches[0],t2=e.touches[1];
      const dist=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
      const nextScale=Math.max(t.minScale||0.05,Math.min(t.maxScale||20,t.gesture.startScale*(dist/t.gesture.startDist)));
      const midX=((t1.clientX+t2.clientX)/2)-rect.left;
      const midY=((t1.clientY+t2.clientY)/2)-rect.top;
      const worldX=(t.gesture.startMidX-t.gesture.baseOffsetX)/t.gesture.startScale;
      const worldY=(t.gesture.startMidY-t.gesture.baseOffsetY)/t.gesture.startScale;
      t.scale=nextScale; t.offsetX=midX-worldX*nextScale; t.offsetY=midY-worldY*nextScale;
      render(); return;
    }

    const pt=getPointFromEvent(e);

    if (t.action&&t.action.type==='moveText'&&t.textObj) {
      t.textObj.x=pt.x-t.action.dx; t.textObj.y=pt.y-t.action.dy; render(); return;
    }
    if (t.action&&t.action.type==='resizeText'&&t.textObj) {
      const to=t.textObj,a=t.action;
      const dx=pt.x-a.startX,dy=pt.y-a.startY;
      const scale=Math.max(0.2,1+(dx+dy)/(a.origW+a.origH));
      const newFontSize=Math.max(10,Math.round(a.startFontSize*scale));
      if (newFontSize!==to.fontSize) {
        to.fontSize=newFontSize; const r=renderTextObj(to); to.canvas=r.canvas; to.w=r.w; to.h=r.h;
      }
      render(); return;
    }
    if (t.drawing) { moveStroke(pt); render(); return; }
    if (t.action&&t.action.type==='shapePreview'&&t.preview) { t.preview.b=pt; render(); return; }
    if (t.action&&t.action.type==='selectionPreview'&&t.preview) { t.preview.b=pt; render(); return; }
    if (t.action&&t.action.type==='moveSelection'&&t.selection) {
      t.selection.x=pt.x-t.action.dx; t.selection.y=pt.y-t.action.dy; render(); return;
    }
    if (t.action&&t.action.type==='resizeSelection'&&t.selection) {
      const s=t.selection;
      const unrot=rotatePoint(pt.x,pt.y,s.x+s.w/2,s.y+s.h/2,-(s.rotation||0));
      resizeSelection(unrot); return;
    }
    if (t.action&&t.action.type==='rotateSelection'&&t.selection) {
      const ang=Math.atan2(pt.y-t.action.cy,pt.x-t.action.cx)*180/Math.PI;
      t.selection.rotation=Math.round((ang+90)/15)*15; render(); return;
    }
  }

  function onCanvasUp(e) {
    e.preventDefault();
    const t=tab();

    if (t.action&&['moveText','resizeText'].includes(t.action.type)) { t.action=null; render(); return; }
    if (t.gesture&&(!e.touches||e.touches.length<2)) { t.gesture=null; render(); return; }
    if (t.drawing) { t.drawing=false; endStroke(); render(); }

    if (t.action&&t.action.type==='shapePreview'&&t.preview) {
      const tool=t.preview.tool,a=t.preview.a,b=t.preview.b;
      t.action=null; t.preview=null; drawFinalShape(tool,a,b); return;
    }
    if (t.action&&t.action.type==='selectionPreview'&&t.preview) {
      const shape=t.action.shape,a=t.preview.a,b=t.preview.b;
      t.action=null; t.preview=null; buildSelection(shape,a,b); return;
    }
    if (t.action&&t.action.type==='rotateSelection') showToast('회전 15° 스냅');
    if (t.action&&['moveSelection','resizeSelection','rotateSelection'].includes(t.action.type)) debouncedSave();
    t.action=null; t.preview=null; render(); syncUI();
  }

  // ── Bind helpers ──────────────────────────────────────────
  function bindTap(el, fn) {
    let _t=false;
    el.addEventListener('touchend',function(e){e.preventDefault();_t=true;fn(e);setTimeout(()=>{_t=false;},600);},{passive:false});
    el.addEventListener('click',function(e){if(_t)return;fn(e);});
  }
  function bindDirectTap(el, fn) {
    let _f=false;
    el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();_f=true;fn(e);setTimeout(()=>{_f=false;},600);},{passive:false});
    el.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();if(_f)return;fn(e);});
  }

  // ── Tabbar events ─────────────────────────────────────────
  bindDirectTap(tabAddBtn, function(){ addTab(); });

  tabbar.addEventListener('touchend', function(e){
    e.preventDefault();
    if (e.target.closest('#tabAddBtn')) return; // bindDirectTap이 처리
    const closeEl = e.target.closest('.tab-close');
    if (closeEl) { closeTab(parseInt(closeEl.dataset.closeIdx)); return; }
    const tabEl = e.target.closest('.tab-item');
    if (tabEl) { switchTab(parseInt(tabEl.dataset.idx)); }
  }, {passive:false});
  tabbar.addEventListener('click', function(e){
    if (e.target.closest('#tabAddBtn')) return;
    const closeEl = e.target.closest('.tab-close');
    if (closeEl) { closeTab(parseInt(closeEl.dataset.closeIdx)); return; }
    const tabEl = e.target.closest('.tab-item');
    if (tabEl) { switchTab(parseInt(tabEl.dataset.idx)); }
  });

  // ── Other button bindings ─────────────────────────────────
  tabButtons.forEach(btn => bindTap(btn, function(){ openPanel(btn.dataset.panel); }));
  bindDirectTap(slideToggle, function(){ toggleSlide(); });
  bindDirectTap(document.getElementById('textToolBtn'), function(){ startTextMode(); });
  bindDirectTap(document.getElementById('noneToolBtn'), function(){ ui.tool='none'; render(); syncUI(); });
  bindDirectTap(document.getElementById('fitViewBtn'), function(){ fitView(); render(); syncUI(); showToast('화면 맞춤'); });

  toolButtons.forEach(btn => bindTap(btn, function(){ setTool(btn.dataset.tool); }));
  bindTap(selectRectBtn, function(){ toggleSelectionMode('rect'); });
  bindTap(selectEllipseBtn, function(){ toggleSelectionMode('ellipse'); });
  bindTap(document.getElementById('selectAllBtn'), function(){ selectAll(); });

  bindTap(document.getElementById('importBtn'), function(){ fileInput.click(); });

  // 원본 불러오기 토글 버튼 - 패널 스크롤 간섭 차단용 직접 바인딩
  (function(){
    const btn = document.getElementById('importOrigBtn');
    let _touched = false;
    btn.addEventListener('touchstart', function(e){ e.stopPropagation(); _touched=true; }, {passive:true});
    btn.addEventListener('touchend', function(e){
      e.preventDefault(); e.stopPropagation();
      if (!_touched) return; _touched=false;
      ui.importOrig = !ui.importOrig;
      btn.classList.toggle('active', ui.importOrig);
      debouncedSave();
      showToast(ui.importOrig ? '원본 크기로 불러오기' : '해상도 기준으로 불러오기');
    }, {passive:false});
    btn.addEventListener('click', function(e){ e.stopPropagation(); });
  })();

  // 해상도 토글 버튼
  bindTap(document.getElementById('resToggleBtn'), function(){
    ui.resCollapsed = !ui.resCollapsed;
    const resGroup = document.getElementById('resGroup');
    const resToggleBtn = document.getElementById('resToggleBtn');
    if (resGroup) resGroup.classList.toggle('collapsed', ui.resCollapsed);
    if (resToggleBtn) resToggleBtn.textContent = ui.resCollapsed ? '▶' : '◀';
    debouncedSave();
  });
  fileInput.addEventListener('change', function(e){ importImage(e.target.files[0]); fileInput.value=''; });
  bindTap(document.getElementById('saveBtn'), function(){ saveFile(); });

  document.querySelectorAll('.res-btn').forEach(btn => {
    bindTap(btn, function(){
      const key=btn.dataset.w==='1600'?'base':btn.dataset.w==='1920'?'fhd':btn.dataset.w==='2560'?'2k':'4k';
      applyResolution(key);
    });
  });

  bindTap(document.getElementById('undoBtn'), function(){ undo(); showToast('되돌리기'); });
  bindTap(document.getElementById('clearBtn'), function(){
    showConfirmOverlay('전체 지우기', '현재 탭의 모든 그림이 지워집니다. 계속할까요?', function(){
      pushHistory(); fillWhite(); clearSelection(false); render(); syncUI(); debouncedSave(); showToast('전체지우기');
    });
  });

  bindTap(document.getElementById('miniCopy'),   function(){ copySelection(); });
  bindTap(document.getElementById('miniCut'),    function(){ cutSelection(); });
  bindTap(document.getElementById('miniDelete'), function(){ deleteSelection(); });
  bindTap(document.getElementById('pasteBtn'),   function(){ pasteClipboard(); });

  function onColorChange(e){ ui.color=e.target.value; syncUI(); showToast('색상'); debouncedSave(); }
  colorInput.addEventListener('input',  onColorChange);
  colorInput.addEventListener('change', onColorChange);
  sizeInput.addEventListener('input', function(e){ ui.size=Number(e.target.value); syncUI(); showToast('굵기'); debouncedSave(); });

  canvas.addEventListener('mousedown', onCanvasDown);
  canvas.addEventListener('mousemove', onCanvasMove);
  window.addEventListener('mouseup', onCanvasUp);
  let _touchStartedOnCanvas=false;
  canvas.addEventListener('touchstart',function(e){_touchStartedOnCanvas=true;onCanvasDown(e);},{passive:false});
  canvas.addEventListener('touchmove', onCanvasMove,{passive:false});
  window.addEventListener('touchend',function(e){
    if(!_touchStartedOnCanvas)return;_touchStartedOnCanvas=false;onCanvasUp(e);
  },{passive:false});

  window.addEventListener('resize', function(){ resizeCanvas(); fitView(); render(); });

  // ── Init ─────────────────────────────────────────────────
  (async function(){
    await loadState();
    bindOverlayEvents();
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        resizeCanvas(); fitView(); render(); syncUI();
        renderTabbar();
      });
    });
  })();
})();
</script>
</body>
