<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML → PDF</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
  --border:#1e2d45;--accent:#00d4ff;--accent2:#00e5a0;
  --text:#c8d8e8;--text2:#7a8a9a;--danger:#ff4466;
  --glow:0 0 20px rgba(0,212,255,0.15);
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;padding:16px;padding-bottom:100px;}
.header{text-align:center;padding:20px 0 16px;}
.header h1{font-size:20px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header .sub{font-size:12px;color:var(--text2);margin-top:4px;}
.drop-zone{border:2px dashed var(--border);border-radius:16px;padding:36px 20px;text-align:center;
  cursor:pointer;transition:all 0.3s;background:var(--surface);}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(0,212,255,0.03);box-shadow:var(--glow);}
.drop-zone .icon{font-size:44px;margin-bottom:10px;opacity:0.7;}
.drop-zone .label{font-size:13px;color:var(--text2);line-height:1.6;}
.drop-zone .label strong{color:var(--accent);}
.drop-zone input{display:none;}
.file-info{display:none;margin-top:14px;padding:12px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;align-items:center;gap:10px;}
.file-info.show{display:flex;}
.file-info .fi-icon{font-size:24px;flex-shrink:0;}
.file-info .fi-details{flex:1;min-width:0;}
.file-info .fi-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-info .fi-size{font-size:10px;color:var(--text2);margin-top:2px;}
.file-info .fi-remove{width:28px;height:28px;border-radius:7px;border:none;
  background:rgba(255,68,102,0.1);color:var(--danger);font-size:14px;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.options{margin-top:14px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.options h3{font-size:12px;font-weight:500;color:var(--accent);margin-bottom:10px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.toggle-row span{font-size:12px;}
.toggle{width:40px;height:22px;background:var(--surface2);border-radius:11px;border:1px solid var(--border);
  cursor:pointer;position:relative;transition:all 0.3s;flex-shrink:0;}
.toggle.on{background:var(--accent);border-color:var(--accent);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;
  background:#fff;transition:transform 0.3s;}
.toggle.on::after{transform:translateX(18px);}
.info-box{margin-top:10px;padding:10px 12px;background:rgba(0,212,255,0.04);
  border:1px solid rgba(0,212,255,0.15);border-radius:8px;font-size:11px;color:var(--text2);line-height:1.6;}
.preview-section{margin-top:14px;display:none;}
.preview-section.show{display:block;}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.preview-header h3{font-size:12px;font-weight:500;color:var(--accent);}
.preview-toggle{font-size:11px;color:var(--text2);background:none;border:1px solid var(--border);
  padding:3px 8px;border-radius:6px;cursor:pointer;font-family:inherit;}
.preview-frame-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;
  background:#fff;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.preview-frame-wrap.dark-bg{background:var(--bg);}
.preview-frame{width:100%;border:none;min-height:200px;}
.btn-row{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;
  background:linear-gradient(transparent,var(--bg) 30%);display:flex;gap:8px;z-index:100;}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0099cc);color:#000;
  box-shadow:0 4px 20px rgba(0,212,255,0.3);}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:300;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:90%;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:rgba(0,229,160,0.15);color:var(--accent2);border:1px solid rgba(0,229,160,0.3);}
.toast.error{background:rgba(255,68,102,0.15);color:var(--danger);border:1px solid rgba(255,68,102,0.3);}
@media(min-width:600px){body{max-width:640px;margin:0 auto;padding:24px;padding-bottom:100px;}}
</style>
</head>
<body>

<div class="header">
  <h1>📄 HTML → PDF</h1>
  <div class="sub">HTML 파일을 PDF로 변환 (인쇄 → PDF 저장)</div>
</div>

<div class="drop-zone" id="dropZone">
  <div class="icon">📁</div>
  <div class="label">여기를 터치하여 <strong>HTML 파일</strong>을 선택<br>또는 드래그 앤 드롭</div>
  <input type="file" id="fileInput" accept=".html,.htm">
</div>

<div class="file-info" id="fileInfo">
  <div class="fi-icon">📝</div>
  <div class="fi-details">
    <div class="fi-name" id="fileName">—</div>
    <div class="fi-size" id="fileSize">—</div>
  </div>
  <button class="fi-remove" id="fileRemove" title="제거">✕</button>
</div>

<div class="options">
  <h3>⚙️ 인쇄 옵션</h3>
  <div class="toggle-row">
    <span>배경색/이미지 포함</span>
    <div class="toggle" id="toggleBg" onclick="this.classList.toggle('on')"></div>
  </div>
  <div class="info-box">
    💡 인쇄 다이얼로그에서 <b>"PDF로 저장"</b>을 선택하세요.<br>
    용지 크기, 방향, 여백은 인쇄 설정에서 직접 조절 가능합니다.<br>
    배경색이 안 나오면 인쇄 설정 → <b>"배경 그래픽"</b> 체크하세요.
  </div>
</div>

<div class="preview-section" id="previewSection">
  <div class="preview-header"><h3>👁️ 미리보기</h3>
    <button class="preview-toggle" id="previewCollapseBtn" onclick="togglePreview()">접기</button></div>
  <div class="preview-frame-wrap" id="previewWrap">
    <iframe class="preview-frame" id="previewFrame" sandbox="allow-same-origin allow-scripts"></iframe></div>
</div>

<div class="btn-row">
  <button class="btn btn-secondary" id="btnPreview" disabled onclick="showPreview()">👁️ 미리보기</button>
  <button class="btn btn-primary" id="btnPrint" disabled onclick="printHTML()">🖨️ PDF 저장 (인쇄)</button>
</div>

<div class="toast" id="toast"></div>

<script>
let loadedHTML = null, loadedFileName = '';
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover');
  if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if(e.target.files.length) handleFile(e.target.files[0]); });
document.getElementById('fileRemove').addEventListener('click', resetFile);

function handleFile(file) {
  if(!file.name.match(/\.html?$/i)) { showToast('HTML 파일만 가능','error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    loadedHTML = e.target.result;
    loadedFileName = file.name.replace(/\.html?$/i,'');
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = formatSize(file.size) + ' · ' + countLines(loadedHTML) + '줄';
    document.getElementById('fileInfo').classList.add('show');
    dropZone.style.display = 'none';
    document.getElementById('btnPreview').disabled = false;
    document.getElementById('btnPrint').disabled = false;
    showPreview();
  };
  reader.readAsText(file, 'UTF-8');
}

function resetFile() {
  loadedHTML = null; loadedFileName = '';
  document.getElementById('fileInfo').classList.remove('show');
  dropZone.style.display = '';
  document.getElementById('previewSection').classList.remove('show');
  fileInput.value = '';
  document.getElementById('btnPreview').disabled = true;
  document.getElementById('btnPrint').disabled = true;
}

function showPreview() {
  if(!loadedHTML) return;
  const sec = document.getElementById('previewSection'); sec.classList.add('show');
  const wrap = document.getElementById('previewWrap');
  const frame = document.getElementById('previewFrame');
  wrap.classList.toggle('dark-bg', /background\s*[:=]\s*#[0-3]/i.test(loadedHTML));
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open(); doc.write(loadedHTML); doc.close();
  setTimeout(() => { try { frame.style.height = Math.min(doc.documentElement.scrollHeight + 20, 2000) + 'px'; } catch(e){} }, 500);
}

function togglePreview() {
  const w = document.getElementById('previewWrap'), b = document.getElementById('previewCollapseBtn');
  if(w.style.display === 'none') { w.style.display = ''; b.textContent = '접기'; }
  else { w.style.display = 'none'; b.textContent = '펼치기'; }
}

function printHTML() {
  if(!loadedHTML) return;
  const includeBg = document.getElementById('toggleBg').classList.contains('on');
  let printCSS = '';
  if(includeBg) {
    printCSS = `<style>@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}}</style>`;
  }
  let html = loadedHTML;
  if(printCSS) {
    if(html.includes('</head>')) html = html.replace('</head>', printCSS + '</head>');
    else html = printCSS + html;
  }
  const w = window.open('', '_blank');
  if(!w) { showToast('팝업 차단됨. 허용 후 다시 시도하세요.','error'); return; }
  w.document.open(); w.document.write(html); w.document.close();
  w.onload = () => { setTimeout(() => w.print(), 500); };
  setTimeout(() => { try { w.print(); } catch(_){} }, 3000);
  showToast('새 탭에서 "PDF로 저장" 선택','success');
}

function formatSize(b) { if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function countLines(s) { return s.split('\n').length; }
function showToast(msg,type) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type;
  setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>t.classList.remove('show'),3500); }

// localStorage
const OPT_KEY = 'HTML_PDF_OPTS';
function saveOpt() { try { localStorage.setItem(OPT_KEY, JSON.stringify({bg:document.getElementById('toggleBg').classList.contains('on')})); } catch(_){} }
function loadOpt() { try { const d=JSON.parse(localStorage.getItem(OPT_KEY)); if(d) document.getElementById('toggleBg').classList.toggle('on',d.bg); } catch(_){} }
new MutationObserver(saveOpt).observe(document.getElementById('toggleBg'),{attributes:true,attributeFilter:['class']});
loadOpt();
</script>
</body>
</html>
